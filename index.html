<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Stash — 50/30/20</title>
<!-- PWA: instalable en el teléfono. Los satélites (manifest/sw/íconos) viven junto al HTML. -->
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#fbfbfd" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Stash">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
:root{
  --bg:#fbfbfd; --card:#ffffff; --tx:#1d1d1f; --tx2:#86868b; --tx3:#aeaeb2;
  --line:rgba(0,0,0,.07); --line2:rgba(0,0,0,.045);
  --ok:#1d8a5f; --ok-bg:rgba(29,138,95,.10);
  --bad:#d13b3b; --bad-bg:rgba(209,59,59,.10);
  --accent:#0071e3;
  --shadow:0 1px 3px rgba(0,0,0,.05),0 1px 2px rgba(0,0,0,.03);
  --rad:18px; --rad-sm:11px;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#000000; --card:#1c1c1e; --tx:#f5f5f7; --tx2:#98989d; --tx3:#636366;
  --line:rgba(255,255,255,.09); --line2:rgba(255,255,255,.06);
  --ok:#5fd3a0; --ok-bg:rgba(95,211,160,.13);
  --bad:#ff6961; --bad-bg:rgba(255,105,97,.14);
  --accent:#2997ff;
  --shadow:0 1px 3px rgba(0,0,0,.3);
}}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",sans-serif;
  background:var(--bg); color:var(--tx);
  -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
  max-width:680px; margin:0 auto; padding:2.5rem 1.5rem 6rem;
  font-size:15px; line-height:1.5;
}
.head{margin-bottom:2rem; position:relative}
#undo{position:absolute; top:0; right:0; font:inherit; font-size:12.5px; font-weight:500;
  color:var(--accent); background:transparent; border:1px solid var(--line); cursor:pointer;
  padding:.42rem .85rem; border-radius:20px; transition:.15s}
#undo:hover{border-color:var(--accent)}
#undo[hidden]{display:none}
.head h1{font-size:28px; font-weight:600; letter-spacing:-.022em; margin-bottom:.65rem}
.month-wrap{display:inline-flex; align-items:center; gap:.4rem; color:var(--tx2); font-size:14px}
#month{
  font:inherit; font-size:14px; font-weight:500; color:var(--accent);
  background:transparent; border:none; border-bottom:1.5px dashed var(--line);
  padding:1px 2px 2px; min-width:120px; transition:border-color .2s;
}
#month:focus{outline:none; border-bottom-color:var(--accent)}
#month::placeholder{color:var(--tx3)}

/* Toggle quincenas */
.q-tabs{display:flex; gap:.45rem; margin-top:.85rem}
.q-tab{
  font:inherit; font-size:13px; font-weight:500;
  padding:.42rem 1rem; border-radius:20px; cursor:pointer; transition:.15s;
  border:1.5px solid var(--line); background:transparent; color:var(--tx2);
}
.q-tab.active{background:var(--accent); border-color:var(--accent); color:#fff}
.q-tab:not(.active):hover{border-color:var(--accent); color:var(--accent)}
.q-tab .qt-d{font-size:10px; opacity:.7; margin-left:.25rem}
.q-tab.addcyc{color:var(--tx3); border-style:dashed; font-weight:600}
.q-tabs{flex-wrap:wrap}

.sec{margin-top:2.25rem}
.sec-h{display:flex; align-items:baseline; justify-content:space-between; margin-bottom:.85rem}
.sec-h .t{font-size:13px; font-weight:600; letter-spacing:.02em; text-transform:uppercase; color:var(--tx2)}
.sec-h .pct{font-size:12px; font-weight:500; color:var(--tx3)}
.sec-h .tw{display:flex; align-items:center; gap:.55rem}
.num{flex:none; width:22px; height:22px; border-radius:50%; display:inline-flex; align-items:center; justify-content:center;
  font-size:12px; font-weight:700; color:#fff; font-variant-numeric:tabular-nums}
.num-nec{background:var(--accent)}
.num-luj{background:#e0922f}
.num-aho{background:var(--ok)}
.sec-note{font-size:13px; color:var(--tx2); margin:-.4rem 0 .9rem}

.meta{display:flex; align-items:center; gap:.5rem; font-size:13px; color:var(--tx2); margin-bottom:.6rem; flex-wrap:wrap}
.meta b{color:var(--tx); font-weight:600; font-variant-numeric:tabular-nums}
.tag{font-size:12px; font-weight:600; padding:2px 9px; border-radius:20px}
.tag.ok{color:var(--ok); background:var(--ok-bg)}
.tag.bad{color:var(--bad); background:var(--bad-bg)}

.bar{height:6px; border-radius:6px; background:var(--line2); overflow:hidden; margin-bottom:1rem}
.bar-fill{height:100%; width:0; border-radius:6px; background:var(--ok); transition:width .35s cubic-bezier(.4,0,.2,1),background .25s}

.row{display:flex; gap:.6rem; align-items:center; padding:.15rem 0}
.row input{font:inherit; color:var(--tx); background:transparent; border:none; padding:.55rem .2rem; transition:background .15s}
.row input.l{flex:1; min-width:0; border-bottom:1px solid var(--line2)}
.row input.a{width:118px; flex:none; text-align:right; font-weight:600; font-variant-numeric:tabular-nums; border-bottom:1px solid var(--line2)}
.row input:focus{outline:none; border-bottom-color:var(--accent)}
.row input.l::placeholder,.row input.a::placeholder{color:var(--tx3)}
input.saved{background:rgba(52,199,89,.20) !important}
.meta .eaten{color:var(--bad); font-weight:600}
.meta .eaten.pos{color:var(--ok)}
.meta .eaten.neutral{color:var(--accent)}
.wizgo{display:none; width:100%; margin-top:1rem; padding:.75rem; border:none; border-radius:var(--rad-sm); background:var(--accent); color:#fff; font:inherit; font-weight:600; font-size:13px; cursor:pointer; transition:.15s}
.wizgo:hover{filter:brightness(1.08)}
.rollover{background:var(--card); border:1px solid var(--line); border-radius:var(--rad); box-shadow:var(--shadow); padding:1.2rem 1.3rem; margin-top:1rem}
.ro-back{border:none; background:transparent; color:var(--tx2); font:inherit; font-size:12.5px; cursor:pointer; padding:.1rem .2rem; margin-bottom:.6rem}
.ro-back:hover{color:var(--accent)}
.ro-h{font-size:13px; color:var(--tx2); line-height:1.5; margin-bottom:1rem}
.ro-h b{color:var(--tx)}
.ro-grid{display:grid; grid-template-columns:1fr 1fr 1fr; gap:.7rem}
.ro-card{background:var(--line2); border-radius:var(--rad-sm); padding:.9rem .8rem; text-align:center}
.ro-t{font-size:12px; color:var(--tx2); margin-bottom:.35rem}
.ro-v{font-size:19px; font-weight:700; color:var(--ok); font-variant-numeric:tabular-nums}
.ro-sub{font-size:10.5px; color:var(--tx3); margin-top:.2rem}
/* Modo enfocado (wizard) */
body.focuson .wizgo{display:none}
body.focuson .reset{display:none}
.splitprev{margin-top:1rem; padding-top:.9rem; border-top:1px solid var(--line2)}
.sp-h{font-size:11px; text-transform:uppercase; letter-spacing:.04em; color:var(--tx3); margin-bottom:.6rem}
.sp-grid{display:grid; grid-template-columns:1fr 1fr 1fr; gap:.6rem}
.sp-c{background:var(--line2); border-radius:var(--rad-sm); padding:.7rem .5rem; text-align:center; display:flex; flex-direction:column; gap:.15rem}
.sp-c span{font-size:11.5px; color:var(--tx2)}
.sp-c b{font-size:16px; font-weight:700; color:var(--tx); font-variant-numeric:tabular-nums}
.sp-c i{font-size:10px; color:var(--tx3); font-style:normal}
.sp-note{font-size:11.5px; color:var(--tx3); line-height:1.5; margin-top:.7rem}
.sp-note b{color:var(--accent)}
.focusnav{display:flex; align-items:center; justify-content:space-between; gap:.6rem; position:sticky; bottom:0; background:var(--bg); padding:.7rem 0 .5rem; margin-top:1rem; border-top:1px solid var(--line)}
.fn-btn{border:1px solid var(--line); background:var(--card); color:var(--tx); font:inherit; font-size:13px; font-weight:600; padding:.6rem 1rem; border-radius:var(--rad-sm); cursor:pointer; transition:.15s}
.fn-btn:hover{border-color:var(--accent); color:var(--accent)}
.fn-btn.primary{background:var(--accent); color:#fff; border-color:var(--accent)}
.fn-btn.primary:hover{filter:brightness(1.08); color:#fff}
.fn-lbl{font-size:12px; color:var(--tx2); text-align:center; flex:1}
.fn-toggle{display:block; margin:.5rem auto 0; border:none; background:transparent; color:var(--tx3); font:inherit; font-size:12px; cursor:pointer; padding:.3rem}
.fn-toggle:hover{color:var(--accent)}
/* Plan quincenal: número hero + detalle colapsable */
.hero-left{text-align:center; padding:1.1rem 1rem .9rem; background:var(--ok-bg); border-radius:var(--rad-sm); margin:.8rem 0 .4rem}
.hl-lbl{font-size:12px; color:var(--tx2); margin-bottom:.3rem}
.hl-val{font-size:34px; font-weight:800; color:var(--ok); font-variant-numeric:tabular-nums; letter-spacing:-.02em; line-height:1}
.hl-val.zero{color:var(--tx2)}
.hl-sub{font-size:11.5px; color:var(--tx3); margin-top:.35rem}
.plan-detail{margin-top:.5rem}
.plan-detail>summary{cursor:pointer; font-size:12px; color:var(--tx2); padding:.4rem 0; list-style:none}
.plan-detail>summary::-webkit-details-marker{display:none}
.plan-detail>summary::before{content:'▸ '; color:var(--tx3)}
.plan-detail[open]>summary::before{content:'▾ '}
/* Rollover en vivo arriba de cada caja */
.rollbonus{font-size:12.5px; color:var(--accent); background:rgba(74,124,247,.08); border:1px dashed var(--accent); border-radius:var(--rad-sm); padding:.5rem .7rem; margin:.3rem 0 .6rem}
.rollbonus b{font-weight:700}
.rb-pct{color:var(--tx3); font-size:11px}
/* Selector de abono a deuda */
.abono-pick{margin-top:.7rem; display:flex; flex-direction:column; gap:.35rem}
.ap-h{font-size:12.5px; color:var(--tx2); margin-bottom:.2rem}
.ap-btn{display:flex; justify-content:space-between; align-items:center; gap:.5rem; font:inherit; font-size:13px; text-align:left; border:none; background:var(--card); color:var(--tx); border-radius:9px; padding:.55rem .7rem; cursor:pointer; transition:.15s}
.ap-btn:hover{background:var(--accent); color:#fff}
.ap-deb{font-size:11px; color:var(--tx3)}
.ap-btn:hover .ap-deb{color:#fff}
.ap-empty{font-size:12.5px; color:var(--tx2)}
.assign-btns button.active{outline:2px solid var(--accent)}
/* Botón de cuotas futuras */
.cuotas-toggle{display:block; width:100%; margin-top:.6rem; padding:.6rem; border:1px solid var(--line); background:transparent; color:var(--tx2); font:inherit; font-size:12.5px; border-radius:var(--rad-sm); cursor:pointer; transition:.15s}
.cuotas-toggle:hover{border-color:var(--accent); color:var(--accent)}
.cuotas-toggle .cc{background:var(--accent); color:#fff; border-radius:10px; padding:.05rem .4rem; font-size:11px; font-weight:700; margin-left:.3rem}
/* Colapsar secciones (vista de pájaro) */
.sec-h.tappable{cursor:pointer; display:flex; align-items:center; justify-content:space-between; user-select:none; border-radius:8px; margin:-.2rem -.4rem .2rem; padding:.2rem .4rem; transition:background .15s}
.sec-h.tappable:hover{background:var(--line2)}
.sec-r{display:flex; align-items:center; gap:.6rem}
.chev{color:var(--tx3); font-size:13px; line-height:1; transition:color .15s}
.sec-h.tappable:hover .chev{color:var(--accent)}
/* Tab bar inferior */
.tabbar{position:fixed; left:0; right:0; bottom:0; z-index:50; display:flex; background:var(--card); border-top:1px solid var(--line); box-shadow:0 -2px 12px rgba(0,0,0,.05)}
.tabbtn{flex:1; border:none; background:transparent; cursor:pointer; padding:.5rem .2rem .6rem; display:flex; flex-direction:column; align-items:center; gap:.15rem; font:inherit; font-size:11px; color:var(--tx3); transition:.15s}
.tabbtn .ti{font-size:18px; line-height:1; filter:grayscale(1); opacity:.55; transition:.15s}
.tabbtn.active{color:var(--accent)}
.tabbtn.active .ti{filter:none; opacity:1}
.tabbtn:hover{color:var(--tx)}
/* Ingreso hero (lo primero y más grande del home) */
.hero-inc{text-align:center; padding:.4rem 0 1.1rem}
.hi-num{font-size:42px; font-weight:800; letter-spacing:-.03em; line-height:1; color:var(--tx); font-variant-numeric:tabular-nums}
.hi-sub{font-size:12.5px; color:var(--tx2); margin-top:.45rem}
.hi-sub b{color:var(--accent); font-weight:600}
.hi-phrase{font-size:11.5px; color:var(--tx3); margin-top:.3rem; font-style:italic}
.hi-edit{margin-top:.7rem; border:1px solid var(--line); background:transparent; color:var(--tx2); font:inherit; font-size:12px; padding:.3rem .8rem; border-radius:20px; cursor:pointer; transition:.15s}
.hi-edit:hover{border-color:var(--accent); color:var(--accent)}
.grid.sm .val{font-size:17px}
.grid.sm .lbl{font-size:10.5px}
.sec.is-collapsed{padding-bottom:.8rem}
.ov-bar{display:flex; justify-content:flex-end; margin:.4rem 0 -.2rem}
.ov-bar button{border:none; background:transparent; color:var(--tx3); font:inherit; font-size:12px; cursor:pointer; padding:.3rem .2rem}
.ov-bar button:hover{color:var(--accent)}
body.focuson .ov-bar{display:none}
/* Informe */
#sec-informe .sec-h .t{font-size:15px}
.inf-h{font-size:11px; text-transform:uppercase; letter-spacing:.04em; color:var(--tx3); margin-bottom:.7rem}
.inf-row{display:flex; align-items:center; gap:.6rem; margin-bottom:.55rem; font-size:12.5px}
.inf-l{flex:0 0 42%; color:var(--tx2)}
.inf-track{flex:1; height:8px; background:var(--line2); border-radius:5px; overflow:hidden}
.inf-fill{display:block; height:100%; border-radius:5px}
.inf-fill.c-nec{background:#4a7cf7}.inf-fill.c-luj{background:#9b6cf7}.inf-fill.c-aho{background:var(--ok)}.inf-fill.c-deu{background:#e0922f}
.inf-v{flex:0 0 auto; font-variant-numeric:tabular-nums; font-weight:600; white-space:nowrap}
.inf-v i{color:var(--tx3); font-style:normal; font-weight:400; font-size:11px}
.inf-tot{font-size:12.5px; color:var(--tx2); margin-top:.5rem; padding-top:.6rem; border-top:1px solid var(--line2)}
.inf-deu{font-size:13px; color:var(--tx2); line-height:1.7}
.inf-deu div{display:flex; justify-content:space-between}
.inf-deu span{font-weight:700; color:var(--tx); font-variant-numeric:tabular-nums}
.inf-verdict{margin-top:.8rem; padding:.85rem 1rem; border-radius:var(--rad-sm); font-size:13px; line-height:1.5}
.inf-verdict.ok{background:var(--ok-bg); color:var(--ok)}
.inf-verdict.bad{background:var(--bad-bg); color:var(--bad)}
.inf-verdict.neutral{background:var(--line2); color:var(--tx2)}
.row input.a[readonly]{color:var(--tx2); border-bottom-color:transparent; cursor:default}
.row .rm{width:28px; height:28px; flex:none; display:flex; align-items:center; justify-content:center;
  border:none; background:transparent; color:var(--tx3); cursor:pointer; border-radius:50%; font-size:17px; line-height:1; transition:.15s}
.row .rm:hover{background:var(--bad-bg); color:var(--bad)}
.row .tjt{width:26px; height:26px; flex:none; display:flex; align-items:center; justify-content:center; border:none; background:transparent; cursor:pointer; border-radius:50%; font-size:13px; opacity:.3; transition:.15s; filter:grayscale(1)}
.row .tjt:hover{opacity:.7; background:var(--line2)}
.row .tjt.on{opacity:1; background:var(--accent); color:#fff; filter:none}
.row.tjon input.a{color:var(--accent); font-weight:600}
.tjpicker{margin:.1rem 0 .6rem; padding:.65rem .75rem; background:var(--line2); border-radius:var(--rad-sm); display:flex; flex-direction:column; gap:.32rem}
.tjpicker-h{font-size:11.5px; color:var(--tx2); margin-bottom:.25rem; line-height:1.4}
.tjpick{font:inherit; font-size:13px; text-align:left; border:none; background:var(--card); color:var(--tx); border-radius:9px; padding:.5rem .65rem; cursor:pointer; transition:.15s; display:flex; justify-content:space-between; align-items:center; gap:.5rem}
.tjpick:hover{background:var(--accent); color:#fff}
.tjpick.sel{outline:2px solid var(--accent)}
.tjpick .rec{font-size:10.5px; color:var(--ok); font-weight:700; margin-left:.4rem}
.tjpick:hover .rec{color:#fff}
.tjpick.none{color:var(--tx2); font-size:12px; background:transparent; border:1px dashed var(--line); justify-content:center}
.tjnm{flex:none}
.tjright{display:flex; gap:.45rem; align-items:center; flex-wrap:wrap; justify-content:flex-end}
.tjav{font-size:11px; color:var(--tx2); white-space:nowrap}
.tjav.warn{color:var(--accent)}
.tjav.bad{color:var(--bad); font-weight:700}
.tjpick:hover .tjav{color:#fff}
.tjcuotas{font-size:12px; color:var(--tx2); padding:.5rem .2rem .1rem; line-height:1.5}
.tjcuotas input{width:46px; font:inherit; text-align:center; border:none; border-bottom:1px solid var(--line); background:transparent; color:var(--tx); padding:.1rem}

/* subcategorías */
.subwrap{margin-left:.9rem; padding-left:.95rem; border-left:1.5px solid var(--line2)}
.row.sub input.l,.row.sub input.a{font-size:13.5px; color:var(--tx2); padding-top:.45rem; padding-bottom:.45rem}
.row.sub input.a{font-weight:500}
.row.sub input:focus{color:var(--tx)}
.sub-add{font-size:12px; color:var(--tx3); margin-top:.15rem; margin-bottom:.35rem}

.add{margin-top:.5rem; font:inherit; font-size:13px; font-weight:500; color:var(--accent);
  background:transparent; border:none; cursor:pointer; padding:.4rem .1rem; display:inline-flex; align-items:center; gap:.3rem; transition:opacity .15s}
.add:hover{opacity:.65}
.add .p{font-size:16px; font-weight:400}

.tot{display:flex; align-items:center; justify-content:space-between;
  background:var(--card); border-radius:var(--rad); box-shadow:var(--shadow);
  padding:1.1rem 1.3rem; margin-top:1.1rem}
.tot .lbl{font-size:13px; color:var(--tx2); font-weight:500}
.tot .val{font-size:26px; font-weight:600; letter-spacing:-.02em; font-variant-numeric:tabular-nums}

.grid{display:grid; grid-template-columns:repeat(3,1fr); gap:.7rem; margin-top:.9rem}
.bcard{background:var(--card); border-radius:var(--rad-sm); box-shadow:var(--shadow); padding:.95rem 1rem}
.bcard .lbl{font-size:12px; color:var(--tx2); font-weight:500; margin-bottom:.3rem}
.bcard .val{font-size:19px; font-weight:600; letter-spacing:-.01em; font-variant-numeric:tabular-nums}
@media(max-width:480px){.grid{grid-template-columns:1fr}}

.reset{margin-top:2rem; font:inherit; font-size:13px; color:var(--tx3); background:transparent;
  border:none; cursor:pointer; transition:color .15s}
.reset:hover{color:var(--bad)}

/* Asignar saldo libre — que la plata no quede en el aire */
.assign{margin-top:1.1rem; background:var(--ok-bg); border-radius:var(--rad); padding:1.15rem 1.3rem}
.assign-h{font-size:14px; font-weight:600; color:var(--tx); letter-spacing:-.01em}
.assign-h b{font-variant-numeric:tabular-nums}
.assign-sub{font-size:12.5px; color:var(--tx2); margin:.25rem 0 1rem}
.assign-amt-wrap{display:flex; align-items:center; gap:.6rem; margin-bottom:.85rem}
.assign-amt-wrap label{font-size:12.5px; color:var(--tx2); font-weight:500}
#assign-amt{font:inherit; font-weight:600; font-variant-numeric:tabular-nums; width:120px; text-align:right;
  background:var(--card); border:1px solid var(--line); border-radius:var(--rad-sm); padding:.5rem .6rem; color:var(--tx)}
#assign-amt:focus{outline:none; border-color:var(--accent)}
.assign-btns{display:flex; flex-direction:column; gap:.4rem}
.assign-btns button{font:inherit; font-size:13px; font-weight:500; cursor:pointer; text-align:left;
  border:1.5px solid var(--line); background:var(--card); color:var(--tx); border-radius:var(--rad-sm); padding:.6rem .9rem; transition:.15s}
.assign-btns button:hover{border-color:var(--ok); color:var(--ok)}
.assign-btns button .n{font-size:11.5px; color:var(--tx3); font-weight:400; margin-left:.35rem}
.assign-note{font-size:12px; color:var(--tx2); margin-top:.9rem; line-height:1.5}

/* Módulo Deudas y tarjetas */
.debts{margin-top:2.75rem; border-top:1px solid var(--line); padding-top:1.6rem}
.debts h2{font-size:19px; font-weight:600; letter-spacing:-.015em; margin-bottom:.2rem}
.dnote{font-size:12.5px; color:var(--tx2); margin-bottom:1.1rem}
.dhead{display:grid; grid-template-columns:1fr 72px 72px 68px 112px 24px; gap:.4rem; font-size:10.5px; text-transform:uppercase; letter-spacing:.04em; color:var(--tx3); margin-bottom:.35rem; padding:0 .15rem}
.dhead .r{text-align:right}
.drow{display:grid; grid-template-columns:1fr 72px 72px 68px 112px 24px; gap:.4rem; align-items:center}
.drow input{width:100%; min-width:0; box-sizing:border-box; font:inherit; font-size:13px; color:var(--tx); background:transparent; border:none; border-bottom:1px solid var(--line2); padding:.45rem .15rem}
.drow input.num{text-align:right; font-variant-numeric:tabular-nums; font-weight:600}
.drow input:focus{outline:none; border-bottom-color:var(--accent)}
.drow .rm{width:26px; height:26px; display:flex; align-items:center; justify-content:center; border:none; background:transparent; color:var(--tx3); cursor:pointer; border-radius:50%; font-size:16px; line-height:1; transition:.15s}
.drow .rm:hover{background:var(--bad-bg); color:var(--bad)}
.autohd{font-size:10.5px; text-transform:uppercase; letter-spacing:.04em; color:var(--tx3); margin:1rem 0 .4rem}
.arow{display:grid; grid-template-columns:1fr auto auto; gap:.6rem; align-items:center; padding:.4rem .15rem; border-bottom:1px dashed var(--line2); font-size:12.5px}
.arow .anm{color:var(--tx2)}
.arow .aamt{color:var(--accent); font-weight:600; font-variant-numeric:tabular-nums; white-space:nowrap}
.arow .adue{color:var(--tx3); font-size:11px; white-space:nowrap; min-width:54px; text-align:right}
.plan{background:var(--card); border-radius:var(--rad); box-shadow:var(--shadow); padding:1.2rem 1.3rem; margin-top:1.4rem}
.plan.hero{margin-top:1.5rem; border:1px solid var(--line); box-shadow:0 4px 16px rgba(0,0,0,.06),0 1px 3px rgba(0,0,0,.04)}
.plan-h{font-size:12.5px; font-weight:600; text-transform:uppercase; letter-spacing:.03em; color:var(--tx2)}
.plan-ctx{font-size:12.5px; color:var(--tx2); margin:.5rem 0 1rem}
.plan-ctx b,.plan-sum b{font-variant-numeric:tabular-nums; color:var(--tx)}
.pl{display:flex; align-items:center; gap:.55rem; padding:.55rem 0; border-bottom:1px solid var(--line2)}
.pl .pnum{width:20px; height:20px; border-radius:50%; background:var(--accent); color:#fff; font-size:11px; font-weight:700; display:inline-flex; align-items:center; justify-content:center; flex:none; font-variant-numeric:tabular-nums}
.pl .nm{flex:1; font-size:13.5px}
.pl .due{font-size:11px; color:var(--tx3)}
.pl .amt{font-size:12.5px; color:var(--tx2); font-variant-numeric:tabular-nums; white-space:nowrap}
.plan-sum{margin-top:1rem; font-size:13px; color:var(--tx2); line-height:1.5}
.pl .why{display:block; font-size:11px; color:var(--tx3); margin-top:.1rem}
.pcheck{width:22px; height:22px; flex:none; border:2px solid var(--line); background:transparent; border-radius:6px; cursor:pointer; color:#fff; font-size:13px; font-weight:800; line-height:1; display:flex; align-items:center; justify-content:center; transition:.15s; padding:0}
.pcheck:hover{border-color:var(--accent)}
.pcheck.on{background:var(--ok); border-color:var(--ok)}
.pl.is-paid{opacity:.5}
.pl.is-paid .nm{text-decoration:line-through}
.row.sub.is-paid{opacity:.55}
.row.sub.is-paid input.l{text-decoration:line-through}
.paidbar{display:flex; gap:.8rem; font-size:12.5px; color:var(--tx2); margin:.2rem 0 .8rem; padding:.5rem .7rem; background:var(--line2); border-radius:var(--rad-sm)}
.paidbar b{color:var(--tx); font-variant-numeric:tabular-nums}
.wf-box{background:var(--line2); border-radius:var(--rad-sm); padding:.7rem .85rem; margin:.4rem 0 1rem}
.wf-h{font-size:11px; text-transform:uppercase; letter-spacing:.04em; color:var(--tx3); margin-bottom:.5rem}
.wf{display:flex; justify-content:space-between; font-size:12.5px; color:var(--tx2); padding:.18rem 0; font-variant-numeric:tabular-nums}
.wf.tot{font-weight:700; color:var(--tx); border-top:1px solid var(--line); margin-top:.15rem; padding-top:.35rem}
.wf-note{font-size:11.5px; color:var(--accent); line-height:1.4; margin:.3rem 0 .15rem}
.tag.part{color:#e0922f; background:rgba(224,146,47,.12)}
.crisis{background:var(--bad-bg); color:var(--bad); padding:.85rem 1rem; border-radius:var(--rad-sm); font-size:12.5px; font-weight:500; margin-bottom:1rem; line-height:1.45}
.calm{background:var(--ok-bg); color:var(--ok); padding:.9rem 1.05rem; border-radius:var(--rad-sm); font-size:13px; font-weight:500; margin-bottom:1rem; line-height:1.5}
.warn{background:rgba(224,146,47,.12); color:#e0922f; padding:.9rem 1.05rem; border-radius:var(--rad-sm); font-size:13px; font-weight:500; margin-bottom:1rem; line-height:1.5}
.tjgrid{display:grid; grid-template-columns:1fr 78px 120px; gap:.7rem}
.tjgrid label{font-size:11px; color:var(--tx3); display:flex; flex-direction:column; gap:.25rem}
.tjgrid input{font:inherit; font-size:14px; color:var(--tx); background:transparent; border:none; border-bottom:1px solid var(--line2); padding:.4rem .15rem; font-weight:600; text-align:right}
.tjgrid input:focus{outline:none; border-bottom-color:var(--accent)}
/* Corazón — "Libre para gastar" por sección (lo primero que ves al abrir) */
.heart{background:var(--card); border:1px solid var(--line); border-radius:var(--rad); box-shadow:var(--shadow); padding:1.1rem 1.1rem 1.2rem; margin:.4rem 0 1.6rem}
.heart-h{font-size:11.5px; font-weight:600; text-transform:uppercase; letter-spacing:.03em; color:var(--tx2); text-align:center; margin-bottom:1rem}
.heart-grid{display:grid; grid-template-columns:1fr 1fr 1fr; gap:.5rem}
.heart-c{text-align:center; display:flex; flex-direction:column; gap:.18rem; padding:0 .2rem}
.hc-lbl{font-size:12px; color:var(--tx2); font-weight:500}
.hc-val{font-size:23px; font-weight:800; font-variant-numeric:tabular-nums; letter-spacing:-.02em; color:var(--ok); line-height:1.1}
.hc-val.neg{color:var(--bad)}
.hc-val.aho{color:var(--tx)}
.hc-sub{font-size:10.5px; color:var(--tx3)}
body.focuson #heart{display:none}
/* Bienvenida — primer arranque: elegir ciclo antes de ver nada */
.welcome{position:fixed; inset:0; z-index:100; background:var(--bg); display:flex; align-items:center; justify-content:center; padding:1.5rem}
.welcome[hidden]{display:none}
.wel-card{width:100%; max-width:420px; text-align:center}
.wel-logo{font-size:30px; font-weight:700; letter-spacing:-.02em; margin-bottom:2rem}
.wel-h{font-size:23px; font-weight:600; letter-spacing:-.02em; margin-bottom:.5rem}
.wel-sub{font-size:14px; color:var(--tx2); margin-bottom:1.8rem}
.wel-opt{display:flex; flex-direction:column; gap:.2rem; width:100%; text-align:left; border:1.5px solid var(--line); background:var(--card); border-radius:var(--rad); padding:1rem 1.2rem; margin-bottom:.8rem; cursor:pointer; transition:.15s; font:inherit}
.wel-opt:hover{border-color:var(--accent); transform:translateY(-1px)}
.wo-t{font-size:16px; font-weight:600; color:var(--tx)}
.wo-s{font-size:12.5px; color:var(--tx2)}
.wel-foot{font-size:12px; color:var(--tx3); line-height:1.5; margin-top:1.4rem}
.wel-foot b{color:var(--tx2)}
body.welcoming .tabbar,body.welcoming .head{display:none}
/* Deuda dentro de Ahorro: Préstamo + Tarjeta de crédito + formulario de tarjeta */
.dgroup{margin-top:.5rem}
.dg-t{font-size:14px; font-weight:600; color:var(--tx); padding:.5rem 0 .15rem}
.dsub-t{font-size:11px; text-transform:uppercase; letter-spacing:.04em; color:var(--tx3); margin:.25rem 0 .15rem}
.dcard{flex:1; min-width:0; display:flex; justify-content:space-between; align-items:center; gap:.5rem; font:inherit; text-align:left; border:none; background:transparent; color:var(--tx); cursor:pointer; padding:.5rem .15rem; border-bottom:1px solid var(--line2)}
.dcard:hover .dc-n{color:var(--accent)}
.dc-n{font-size:13.5px}
.dc-d{font-size:11.5px; color:var(--tx3); white-space:nowrap}
.cardform{background:var(--line2); border-radius:var(--rad-sm); padding:.9rem .9rem 1rem; margin:.5rem 0 .7rem}
.cf-h{font-size:12px; font-weight:700; color:var(--tx2); text-transform:uppercase; letter-spacing:.03em; margin-bottom:.7rem}
.cf-l{display:flex; flex-direction:column; gap:.25rem; font-size:11.5px; color:var(--tx2); margin-bottom:.6rem}
.cf-i{font:inherit; font-size:14px; color:var(--tx); background:var(--card); border:1px solid var(--line); border-radius:9px; padding:.55rem .65rem}
.cf-i:focus{outline:none; border-color:var(--accent)}
.cf-btns{display:flex; gap:.5rem; margin-top:.5rem}
.cf-save{flex:1; border:none; background:var(--accent); color:#fff; font:inherit; font-weight:600; font-size:13px; border-radius:9px; padding:.65rem; cursor:pointer}
.cf-save:hover{filter:brightness(1.08)}
.cf-cancel{border:1px solid var(--line); background:transparent; color:var(--tx2); font:inherit; font-size:13px; border-radius:9px; padding:.65rem 1rem; cursor:pointer}
/* Selección de qué deuda pagar este ciclo + modo (Mín/Mes/Total) */
.dmodes{display:flex; gap:.35rem; padding:.1rem 0 .55rem 1.9rem; flex-wrap:wrap}
.dmode{font:inherit; font-size:11px; border:1px solid var(--line); background:transparent; color:var(--tx2); border-radius:14px; padding:.3rem .55rem; cursor:pointer; transition:.15s; font-variant-numeric:tabular-nums}
.dmode:hover{border-color:var(--accent); color:var(--accent)}
.dmode.on{background:var(--accent); border-color:var(--accent); color:#fff}
.drec{font-size:11px}
.dtotal{font-size:12.5px; color:var(--tx2); margin-top:.7rem; padding-top:.55rem; border-top:1px solid var(--line2)}
.dtotal b{color:var(--tx); font-variant-numeric:tabular-nums}
.pchk-plan.on{background:var(--accent); border-color:var(--accent)}
.pchk-paid.on{background:var(--ok); border-color:var(--ok)}
.row.sub.is-paid .dc-n{text-decoration:line-through}
.row.is-paid input.l{text-decoration:line-through; opacity:.6}
.dlegend{font-size:11px; color:var(--tx3); line-height:1.45; margin:.15rem 0 .5rem}
.dlegend b{color:var(--tx2)}
/* Copia de seguridad (exportar / importar datos) */
.backup{display:flex; gap:.6rem; justify-content:center; margin-top:1.6rem; flex-wrap:wrap}
.bk-btn{font:inherit; font-size:12px; color:var(--tx2); background:transparent; border:1px solid var(--line); border-radius:20px; padding:.45rem .9rem; cursor:pointer; transition:.15s}
.bk-btn:hover{border-color:var(--accent); color:var(--accent)}
/* Banco / selector de deudas a pagar esta quincena */
.debtpicker{background:var(--line2); border-radius:var(--rad-sm); padding:.8rem; margin:.3rem 0 .7rem}
.pk-h{font-size:12px; color:var(--tx2); margin-bottom:.7rem; line-height:1.4}
.pkrow{background:var(--card); border-radius:9px; padding:.6rem .7rem; margin-bottom:.5rem}
.pk-top{display:flex; justify-content:space-between; align-items:center; gap:.5rem}
.pk-n{font-size:13.5px; font-weight:600; color:var(--tx)}
.pk-act{display:flex; gap:.15rem; flex:none}
.pk-edit,.pk-del{border:none; background:transparent; color:var(--tx3); cursor:pointer; font-size:14px; padding:.2rem .35rem; border-radius:6px; line-height:1}
.pk-edit:hover,.pk-del:hover{background:var(--line2); color:var(--accent)}
.pk-info{font-size:11.5px; color:var(--tx3); margin:.15rem 0 .5rem}
.pk-modes{display:flex; gap:.4rem; flex-wrap:wrap}
.pk-m{font:inherit; font-size:11.5px; border:1px solid var(--line); background:transparent; color:var(--tx2); border-radius:14px; padding:.35rem .6rem; cursor:pointer; transition:.15s; font-variant-numeric:tabular-nums}
.pk-m:hover{background:var(--accent); border-color:var(--accent); color:#fff}
.pk-empty{font-size:12.5px; color:var(--tx3); text-align:center; padding:.5rem}
.pk-new{display:block; width:100%; margin:.3rem 0; font:inherit; font-size:12.5px; color:var(--accent); background:transparent; border:1px dashed var(--line); border-radius:9px; padding:.55rem; cursor:pointer}
.pk-new:hover{border-color:var(--accent)}
.pk-done{display:block; width:100%; margin-top:.4rem; font:inherit; font-size:13px; font-weight:600; color:#fff; background:var(--accent); border:none; border-radius:9px; padding:.55rem; cursor:pointer}
.dd-ic{display:inline-flex; align-items:center; color:var(--accent); margin-right:.15rem}
.dd-n{flex:1; font-size:13.5px}
/* Plantillas */
.tpl{margin-top:1.6rem; text-align:center}
.tpl-h{font-size:12px; font-weight:600; text-transform:uppercase; letter-spacing:.03em; color:var(--tx2); margin-bottom:.7rem}
.tpl-list{display:flex; flex-wrap:wrap; gap:.5rem; justify-content:center; margin-bottom:.8rem}
.tpl-item{display:inline-flex; align-items:center; border:1px solid var(--line); border-radius:20px; overflow:hidden}
.tpl-load{font:inherit; font-size:12.5px; color:var(--tx); background:transparent; border:none; padding:.45rem .35rem .45rem .9rem; cursor:pointer}
.tpl-load:hover{color:var(--accent)}
.tpl-del{font:inherit; font-size:15px; color:var(--tx3); background:transparent; border:none; padding:.3rem .6rem .3rem .2rem; cursor:pointer; line-height:1}
.tpl-del:hover{color:var(--bad)}
.tpl-empty{font-size:12px; color:var(--tx3); line-height:1.45; margin:0 auto .8rem; max-width:340px}
/* Salud de tarjetas */
.salud{background:var(--card); border:1px solid var(--line); border-radius:var(--rad); box-shadow:var(--shadow); padding:1rem 1.1rem; margin:.4rem 0 1.4rem}
.sa-h{font-size:12px; font-weight:600; color:var(--tx2); margin-bottom:.8rem; line-height:1.4}
.sa-row{display:flex; align-items:center; gap:.6rem; margin-bottom:.5rem}
.sa-n{flex:0 0 32%; font-size:12.5px; color:var(--tx); overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
.sa-bar{flex:1; height:8px; background:var(--line2); border-radius:5px; overflow:hidden}
.sa-fill{display:block; height:100%; border-radius:5px; background:var(--tx3)}
.sa-fill.sa-green{background:var(--ok)} .sa-fill.sa-amber{background:#e0922f} .sa-fill.sa-red{background:var(--bad)}
.sa-pct{flex:0 0 auto; font-size:11.5px; font-weight:600; font-variant-numeric:tabular-nums; color:var(--tx2); min-width:56px; text-align:right}
.sa-pct.sa-green{color:var(--ok)} .sa-pct.sa-amber{color:#e0922f} .sa-pct.sa-red{color:var(--bad)}
.sa-verdict{font-size:12.5px; line-height:1.5; margin-top:.8rem; padding-top:.7rem; border-top:1px solid var(--line2); color:var(--tx)}
.sa-prio{font-size:12.5px; line-height:1.5; margin-top:.6rem; color:var(--tx2)}
.sa-prio b{color:var(--tx)}
.tjpick:disabled,.tjpick.tjp-block{opacity:.45; cursor:not-allowed}
.dd-d{font-size:11px; color:var(--tx3); white-space:nowrap; margin-right:.2rem}
</style>
</head>
<body>
<div id="welcome" class="welcome" hidden>
  <div class="wel-card">
    <div class="wel-logo">Stash</div>
    <div class="wel-h">¿Cómo te pagan?</div>
    <div class="wel-sub">Con eso organizamos tu dinero. Lo puedes cambiar después.</div>
    <button class="wel-opt" data-cyc-type="q"><span class="wo-t">Por quincena</span><span class="wo-s">Me pagan dos veces al mes</span></button>
    <button class="wel-opt" data-cyc-type="m"><span class="wo-t">Por mes</span><span class="wo-s">Me pagan una vez al mes</span></button>
    <div class="wel-foot">Stash reparte tu dinero con la regla <b>50/30/20</b> — el método de Elizabeth Warren (Harvard) para ahorrar primero y gastar tranquilo.</div>
  </div>
</div>
<div class="head">
  <h1>Stash</h1>
  <span class="month-wrap">Mes: <input id="month" placeholder="Julio 2026"></span>
  <div class="q-tabs" id="cyclebar"></div>
  <button id="undo" hidden>&#8624; Deshacer</button>
</div>
<div id="app"></div>
<div id="debts" class="debts"></div>
<nav class="tabbar">
  <button class="tabbtn active" data-view="inicio"><span class="ti">🏠</span><span>Inicio</span></button>
  <button class="tabbtn" data-view="deudas"><span class="ti">💳</span><span>Deudas</span></button>
  <button class="tabbtn" data-view="resumen"><span class="ti">📊</span><span>Resumen</span></button>
</nav>
<script>
// ===== Ciclos (quincenal o mensual). Cada ciclo tiene su propio presupuesto. =====
function keyFor(id){return 'midas_pp_'+id;}
function loadCycles(){try{const x=JSON.parse(localStorage.getItem('midas_cycles'));if(Array.isArray(x)&&x.length)return x;}catch(e){}
  return [{id:'q1',type:'q',label:'Quincena 1'},{id:'q2',type:'q',label:'Quincena 2'}];}
let cycles=loadCycles();
function saveCycles(){localStorage.setItem('midas_cycles',JSON.stringify(cycles));}
// Migración: dato viejo v1 → q1
(function migrate(){const old=localStorage.getItem('midas_pp_v1');
  if(old && !localStorage.getItem(keyFor('q1'))) localStorage.setItem(keyFor('q1'), old);})();

let activeQ = localStorage.getItem('midas_active_cycle') || cycles[0].id; // id del ciclo activo
if(!cycles.find(c=>c.id===activeQ)) activeQ=cycles[0].id;
const cycleOf=id=>cycles.find(c=>c.id===id)||cycles[0];
function cyclePayday(id){const x=(id===activeQ&&typeof d!=='undefined')?d:load(id);return x&&x.payday||'';}
function renderCycleBar(){
  const bar=document.getElementById('cyclebar');if(!bar)return;
  bar.innerHTML=cycles.map(c=>{const pd=cyclePayday(c.id);
    return '<button class="q-tab'+(c.id===activeQ?' active':'')+'" data-cyc="'+c.id+'">'+esc(c.label)+(pd?' <span class="qt-d">'+dueLabel(pd)+'</span>':'')+'</button>';}).join('')+
    '<button class="q-tab addcyc" data-addcycle="q" title="Agregar quincena">+ Q</button>'+
    '<button class="q-tab addcyc" data-addcycle="m" title="Agregar mes">+ Mes</button>';
}
function switchCycle(id){if(id===activeQ)return;save();activeQ=id;d=load(activeQ);showRollover=!!(d&&d.rollover&&d.rollover.saldo>0);
  view='inicio'; // cambiar de ciclo siempre lleva al corazón (las 3 cajas)
  localStorage.setItem('midas_active_cycle',activeQ);history=[];render();renderDebts();updateUndo();}
function addCycle(type){
  const withDates=cycles.map(c=>dateVal(cyclePayday(c.id))).filter(s=>!isNaN(s)&&s<9e15);
  let base='';
  if(withDates.length){const dt=new Date(Math.max.apply(null,withDates));
    if(type==='m')dt.setMonth(dt.getMonth()+1); else dt.setDate(dt.getDate()+15);
    base=dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0');}
  const id='c'+Date.now(), n=cycles.filter(c=>c.type===type).length+1;
  cycles.push({id,type,label:(type==='m'?'Mes ':'Quincena ')+n});saveCycles();
  const nd=def();nd.payday=base;localStorage.setItem(keyFor(id),JSON.stringify(nd));
  switchCycle(id);
}
let tjOpen=null; // "g-i" de la línea con el selector de tarjeta abierto
// Modo guiado por escenas: Ahorro → Lujos → Necesidades → Plan quincenal.
const WIZ=['sec-aho','sec-luj','sec-nec','planbox'];
let wizStep=0;
let showRollover=false; // true = muestra el reparto 50/30/20 arriba de cada caja
let lastSaldo=0; // último saldo libre calculado (para congelar el rollover)
let abonoOpen=false; // true = panel de saldo libre muestra el selector de a qué deuda abonar
let collapsed={aho:true,nec:true,luj:true,balance:true}; // al abrir: 3 cajas + balance colapsados
let incEdit=false; // editar/agregar ingreso (oculto por defecto; el ingreso se ve grande arriba)
let view='inicio'; // tab activo: inicio (las 3 cajas) | plan | deudas | informe
// Modo enfocado (wizard): una sola caja a la vez. Arranca APAGADO → se ve el overview de las 3 cajas.
let focusMode=false, focusStep=0, lastOver=0;
const FOCUS_LABELS={'sec-inc':'Sueldo','sec-aho':'Ahorro y deudas','sec-luj':'Lujos','sec-nec':'Necesidades','sec-balance':'Resumen y sobrante'};
const ALL_SCENES=['sec-inc','sec-aho','sec-luj','sec-nec','sec-balance'];
function focusScenes(){
  // Si el ahorro se excede (por deuda), Lujos va primero — es lo primero que se sacrifica.
  const tail = lastOver>0.5 ? ['sec-luj','sec-nec'] : ['sec-nec','sec-luj'];
  return ['sec-inc','sec-aho',tail[0],tail[1],'sec-balance'];
}
function applyFocus(){
  document.body.classList.toggle('focuson',focusMode);
  const scenes=focusScenes();
  focusStep=Math.max(0,Math.min(focusStep,scenes.length-1));
  ALL_SCENES.forEach(id=>{const el=document.getElementById(id);if(el)el.style.display=(!focusMode||id===scenes[focusStep])?'':'none';});
  const nav=document.getElementById('focusnav');if(nav)nav.style.display=focusMode?'':'none';
  const lbl=document.getElementById('focus-label');if(lbl)lbl.textContent='Paso '+(focusStep+1)+'/'+scenes.length+' · '+FOCUS_LABELS[scenes[focusStep]];
  const back=document.getElementById('focus-back');if(back)back.style.visibility=focusStep===0?'hidden':'';
  const cont=document.getElementById('focus-cont');if(cont)cont.textContent=focusStep>=scenes.length-1?'✓ Listo':'Continuar →';
  const tog=document.getElementById('focus-toggle');if(tog)tog.textContent=focusMode?'☰ Ver todo':'⊟ Modo enfocado';
}
// Tabs de nivel superior: muestra/oculta los bloques según la vista activa.
function applyView(){
  const setD=(id,show)=>{const el=document.getElementById(id);if(el)el.style.display=show?'':'none';};
  const inicio=view==='inicio';
  const budgetSecs=['sec-inc','sec-aho','sec-luj','sec-nec','sec-balance'];
  if(inicio){ applyFocus(); }
  else { budgetSecs.forEach(id=>setD(id,false)); setD('focusnav',false); }
  setD('heart', inicio);
  const tog=document.getElementById('focus-toggle');if(tog)tog.style.display=inicio?'':'none';

function load(q){
  try{
    const x=JSON.parse(localStorage.getItem(keyFor(q)));
    if(x&&x.inc){
      if(x.month===undefined)x.month='';
      if(x.payday===undefined)x.payday='';
      // Sanear fechas con año absurdo (ej. "0002-07-15" por mal tipeo) → tratar como sin fecha.
      if(x.payday){const yr=parseInt((x.payday.split('-')[0])||'0',10);if(yr<2000||yr>2100)x.payday='';}
      if(Array.isArray(x.aho))x.aho=x.aho.filter(r=>!/deuda|tarjeta/i.test(r.l||'')); // la deuda ahora viene del plan
      return x;
    }
  }catch(e){}
  return def();
}

function exportData(){
  const data={};for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k&&k.indexOf('midas_')===0)data[k]=localStorage.getItem(k);}
  const blob=new Blob([JSON.stringify(data)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='stash-backup.json';document.body.appendChild(a);a.click();a.remove();
}
function importData(file){
  const r=new FileReader();
  r.onload=e=>{try{const data=JSON.parse(e.target.result);Object.keys(data).forEach(k=>{if(k.indexOf('midas_')===0)localStorage.setItem(k,typeof data[k]==='string'?data[k]:JSON.stringify(data[k]));});localStorage.setItem('midas_onboarded','1');location.reload();}catch(err){alert('No pude leer el archivo. ¿Es tu copia de Stash (stash-backup.json)?');}};
  r.readAsText(file);
}

function tjPickerH(g,i,j,r){
  const sj=(j!=null?' data-sub="'+j+'"':''); // identidad de subcategoría en los data-attrs
  const cards=(typeof debts!=='undefined'?debts:[]).filter(x=>!x.auto&&!/pr[eé]stamo|colegio/i.test(x.n||''));

  const monto=hasSubs(r)?sum(r.sub):(parseFloat(r.a)||0);
  const avail=c=>cardAvail(c);
  const hasInfo=c=>(c.disp!=null&&c.disp!=='')||(parseFloat(c.limite)||0)>0;
  // Recomendada: la de mayor línea libre que aguante el monto; si ninguna aguanta, la de mayor línea libre.
  const byAvail=cards.slice().sort((a,b)=>avail(b)-avail(a));
  const rec=((byAvail.find(c=>hasInfo(c)&&avail(c)>=monto))||byAvail[0]).n;
  const fits=cards.some(c=>hasInfo(c)&&avail(c)>=monto);
  const opts=(fits?'':'<div class="tjpicker-h" style="color:var(--bad)">⚠️ Ninguna tarjeta tiene cupo para '+pe(monto)+'. Págalo en efectivo, o baja una tarjeta para liberar cupo.</div>')+cards.map(c=>{

      ? '<span class="tjav'+(av<monto?' bad':'')+'">disponible '+pe(av)+(av<monto?' · no alcanza':'')+'</span>'
      : '<span class="tjav warn" data-addline="'+debts.indexOf(c)+'">añade su línea ✎</span>';
    return '<button class="tjpick'+(r.tjCard===c.n?' sel':'')+(blocked?' tjp-block':'')+'"'+(blocked?' disabled':' data-tjpick="'+esc(c.n)+'"')+' data-grp="'+g+'" data-idx="'+i+'"'+sj+'>'+
      '<span class="tjnm">'+esc(c.n)+(!blocked&&c.n===rec?' <span class="rec">recomendada</span>':'')+'</span>'+
      '<span class="tjright">'+info+'</span></button>';
  }).join('');
  const cuotas=Math.max(parseInt(r.tjCuotas)||1,1);

    cuotaBox+'</div>';
}

// Informe final: a dónde va la plata + ¿reduces o creces deuda?
function informeH(){
  const ti=sum(d.inc), p=computePlan();
  const necCash=sumCash(d.nec), lujCash=sumCash(d.luj), ahoSav=sum(d.aho);
  const debtPay=p.paySum, tarj=p.tarj, total=necCash+lujCash+ahoSav+debtPay;
  const pct=v=>ti>0?Math.round(v/ti*100):0;
  const bar=(label,v,cls)=>'<div class="inf-row"><span class="inf-l">'+label+'</span><span class="inf-track"><span class="inf-fill '+cls+'" style="width:'+Math.min(pct(v),100)+'%"></span></span><span class="inf-v">'+pe(v)+' <i>'+pct(v)+'%</i></span></div>';
  let h='<div class="inf-h">A dónde va tu plata esta quincena</div>';
  h+=bar('Necesidades (efectivo)',necCash,'c-nec');
  h+=bar('Lujos (efectivo)',lujCash,'c-luj');
  h+=bar('Ahorro (Fondo + Inversión)',ahoSav,'c-aho');
  h+=bar('Deuda (pago de mínimos)',debtPay,'c-deu');
  h+='<div class="inf-tot">Destinas <b>'+pe(total)+'</b> de <b>'+pe(ti)+'</b> de ingreso'+(ti-total>0.5?' · te queda <b>'+pe(ti-total)+'</b> libre':'')+'</div>';
  h+='<div class="inf-h" style="margin-top:1.3rem">Deuda: ¿la reduces o la creces?</div>';
  h+='<div class="inf-deu"><div>Cargas <b>nuevas</b> a tarjeta este mes <span>'+pe(tarj)+'</span></div><div>Pagas a tus deudas <span>'+pe(debtPay)+'</span></div></div>';
  if(debtPay>=tarj+0.5) h+='<div class="inf-verdict ok">✅ Pagas <b>'+pe(debtPay-tarj)+'</b> más de lo que generas — vas <b>reduciendo</b> deuda.</div>';
  else if(tarj>debtPay+0.5) h+='<div class="inf-verdict bad">⚠️ Generas <b>'+pe(tarj-debtPay)+'</b> más deuda de la que pagas — está <b>creciendo</b>. Tarjetea menos o abona más.</div>';
  else h+='<div class="inf-verdict neutral">➖ Pagas casi lo mismo que cargas — tu deuda se mantiene.</div>';
  return h;
}
function refreshInforme(){const el=document.getElementById('informe-body');if(el)el.innerHTML=informeH();}
function recompute(){
  syncParents();
  if(typeof reconcileTjDebts==='function')reconcileTjDebts();
  const ti=sum(d.inc);
  const ge=(id)=>document.getElementById(id);
  const tot=ge('tot-inc');if(tot)tot.textContent=pe(ti);
  const binc=ge('b-inc');if(binc)binc.textContent=pe(ti);
  const hn=ge('hi-num');if(hn)hn.textContent=pe(ti);
  const hc=ge('hi-cycle');if(hc)hc.textContent=cycleOf(activeQ).label+(d.payday?' · desde '+dueLabel(d.payday):(d.month?' · '+d.month:''));
  let gas=0;const acts={},tgts={};
  buckets.forEach(b=>{const g=b[0];let act=(g==='nec'||g==='luj')?sumCash(d[g]):sum(d[g]);
    if(g==='aho'){act+=debtPaySum();}
    const tgt=ti*b[2];gas+=act;acts[g]=act;tgts[g]=tgt;
    document.getElementById('tg-'+g).textContent=pe(tgt);
    document.getElementById('sm-'+g).textContent=pe(act);
    const tag=document.getElementById('tag-'+g);
    const over=act>tgt;
    tag.textContent=over?'excede '+pe(act-tgt):'dentro de la meta';
    tag.className='tag '+(over?'bad':'ok');
    const bar=document.getElementById('bar-'+g);
    const pctFill=tgt>0?Math.min(act/tgt*100,100):0;
    bar.style.width=pctFill+'%';
    bar.style.background=over?'var(--bad)':'var(--ok)';
  });
  // Cascada: el excedente de Ahorro (el MISMO "excede" del bucket, act-tgt, incluye deuda)
  // se come primero Lujos, luego Necesidades. Indicador único por bucket que cambia de signo:
  // neto = meta − gastado − comido_por_cascada. >0 = libre (verde), <0 = déficit (rojo).
  const overTotal=Math.max((acts.aho||0)-(tgts.aho||0),0);
  lastOver=overTotal; // para decidir el orden del wizard (Lujos primero si hay exceso)
  let over=overTotal;
  const eatenLuj=Math.min(over,tgts.luj||0);over-=eatenLuj;
  const eatenNec=Math.min(over,tgts.nec||0);
  const eatenOf={luj:eatenLuj,nec:eatenNec};
  ['luj','nec'].forEach(g=>{const el=document.getElementById('eaten-'+g);const tagEl=document.getElementById('tag-'+g);if(!el)return;
    const eat=eatenOf[g]||0;
    const neto=(tgts[g]||0)-(acts[g]||0)-eat; // margen tras tu gasto y la cascada
    if(eat>0.5){
      // Mostrar EXPLÍCITO lo que bajó de tu ahorro + el resultado. Oculta el tag para no contradecir.
      if(tagEl)tagEl.style.display='none';
      const res = neto>0.5?'te queda + '+pe(neto)+' de margen' : (neto<-0.5?'te falta '+pe(-neto)+' (déficit)':'queda justo en 0');
      el.className = neto<-0.5?'eaten':(neto>0.5?'eaten pos':'eaten neutral');
      el.textContent=' · ↓ '+pe(eat)+' bajó de tu ahorro → '+res;
    } else {
      if(tagEl)tagEl.style.display='';
      const margen=(tgts[g]||0)-(acts[g]||0);
      if(margen>0.5){el.className='eaten pos';el.textContent=' · + '+pe(margen)+' de margen';}
      else{el.className='eaten';el.textContent='';}
    }});
  const ahoEl=document.getElementById('eaten-aho');
  if(ahoEl){ahoEl.className='eaten neutral';ahoEl.textContent=overTotal>0.5?' · baja '+pe(overTotal)+' a Lujos y Necesidades':'';}
  // Corazón — "Libre para gastar" por sección. nec/luj = lo que te queda para gastar; ahorro = lo que apartas vs tu meta.
  (function(){
    const setHC=(id,v)=>{const e=document.getElementById(id);if(e){e.textContent=pe(v);e.classList.toggle('neg',v<-0.5);}};
    setHC('heart-nec',(tgts.nec||0)-(acts.nec||0)-eatenNec);
    setHC('heart-luj',(tgts.luj||0)-(acts.luj||0)-eatenLuj);
    const ah=document.getElementById('heart-aho');if(ah)ah.textContent=pe(acts.aho||0);
    const ahs=document.getElementById('heart-aho-sub');if(ahs)ahs.textContent='de tu meta '+pe(tgts.aho||0);
  })();
  document.getElementById('b-gas').textContent=pe(gas);
  const saldo=ti-gas,sl=document.getElementById('b-sl');
  lastSaldo=saldo; // para el snapshot del rollover
  sl.textContent=pe(saldo);
  sl.style.color=saldo>=0?'var(--ok)':'var(--bad)';
  document.getElementById('b-sl-l').textContent=saldo>=0?'Saldo libre':'Déficit';
  // Rollover GUARDADO: muestra arriba de cada caja el monto disponible que quedó fijado
  // al hacer el rollover (d.rollover). Persiste — no se recalcula en vivo.
  // Rollover DINÁMICO: reparte el saldo libre ACTUAL. Si pagas más deuda y baja el saldo, baja/desaparece solo.
  const _ro={aho:0.2,nec:0.5,luj:0.3};
  ['aho','nec','luj'].forEach(g=>{const el=document.getElementById('roll-'+g);if(!el)return;
    const amt=showRollover?Math.max(saldo,0)*_ro[g]:0;
    if(amt>0.5){el.style.display='';el.innerHTML='↻ Disponible para gastar aquí: <b>+ '+pe(amt)+'</b>';}
    else{el.style.display='none';el.innerHTML='';}});
  const aw=document.getElementById('assign-wrap');
  if(aw) aw.innerHTML = saldo>0.5 ? assignPanelH(saldo,abonoOpen) : '';
  refreshPlan();
  if(typeof refreshAutoDebts==='function')refreshAutoDebts();
  if(typeof refreshInforme==='function')refreshInforme();
  // Split-preview en la escena de Sueldo: el 50/30/20 al instante + el aval.
  const sp=document.getElementById('split-preview');
  if(sp)sp.innerHTML = ti>0
    ? '<div class="sp-h">Tu reparto 50/30/20</div>'+
      '<div class="sp-grid"><div class="sp-c"><span>Ahorro</span><b>'+pe(ti*.2)+'</b><i>20%</i></div>'+
      '<div class="sp-c"><span>Necesidades</span><b>'+pe(ti*.5)+'</b><i>50%</i></div>'+
      '<div class="sp-c"><span>Lujos</span><b>'+pe(ti*.3)+'</b><i>30%</i></div></div>'+
      '<div class="sp-note">Regla popularizada por Elizabeth Warren (<i>All Your Worth</i>) — simple y sostenible. Y lo primero: <b>págate primero</b>, ahorrar antes de gastar (<i>El hombre más rico de Babilonia</i>).</div>'
    : '<div class="sp-note">Pon tu sueldo arriba y verás el reparto 50/30/20 al instante.</div>';
  if(typeof applyView==='function')applyView();
}

/* ===== Módulo Deudas — motor de plan de pago priorizado ===== */
const DEBT_KEY='midas_debts';
const debtDef=()=>[];
function loadDebts(){try{const x=JSON.parse(localStorage.getItem(DEBT_KEY));if(Array.isArray(x))return x.filter(r=>!r.auto);}catch(e){}return debtDef();}
let debts=loadDebts();
function saveDebts(){localStorage.setItem(DEBT_KEY,JSON.stringify(debts));}
// Suma meses a una fecha ISO (para escalonar las cuotas de tarjeteo por ciclo).
function addMonths(iso,k){if(!iso)return '';const dt=new Date(iso+'T00:00:00');if(isNaN(dt))return '';dt.setMonth(dt.getMonth()+k);
  return dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0');}
// Regenera las filas de cuota (auto) desde el estado de tarjeteo del presupuesto. Idempotente.
function reconcileTjDebts(){
  const manual=debts.filter(x=>!x.auto), auto=[];
  cycles.forEach(c=>{const q=c.id;const x=(q===activeQ)?d:load(q);
    const base=x.payday||'';
    // Genera N cuotas (la 1ra el PRÓXIMO mes, misma fecha: k+1) para un gasto tarjeteado.
    const emit=(label,monto,card,cuotasN)=>{
      if(!card||monto<=0)return;
      const N=Math.max(parseInt(cuotasN)||1,1), cuota=Math.round(monto/N*100)/100;
      for(let k=0;k<N;k++)auto.push({n:label+' ('+card+')'+(N>1?' · cuota '+(k+1)+'/'+N:''),
        total:cuota,min:cuota,limite:'',vence:base?addMonths(base,k+1):'',auto:true,card:card});
    };
    ['nec','luj'].forEach(g=>{(x[g]||[]).forEach(r=>{
      const hasS=r.sub&&r.sub.length;
      if(r.tj&&r.tjCard){ // categoría entera en tarjeta
        const monto=hasS?r.sub.reduce((t,s)=>t+(parseFloat(s.a)||0),0):(parseFloat(r.a)||0);
        emit(r.l||'Gasto',monto,r.tjCard,r.tjCuotas);
      } else if(hasS){ // o subcategorías sueltas en tarjeta
        r.sub.forEach(s=>{if(s.tj&&s.tjCard)emit((r.l?r.l+' / ':'')+(s.l||'sub'),parseFloat(s.a)||0,s.tjCard,s.tjCuotas);});
      }
    });});
  });
  debts=manual.concat(auto);saveDebts();
}
function autoDebtsH(){
  const auto=debts.filter(x=>x.auto);
  if(!auto.length)return '';
  return '<div class="autohd">Cuotas de tarjeteo · automáticas desde tu presupuesto</div>'+

}
function refreshAutoDebts(){const el=document.getElementById('autodebts');if(el)el.innerHTML=autoDebtsH();}
function cuotasCountH(){const n=debts.filter(x=>x.auto).length;return n?' <span class="cc">'+n+'</span>':'';}
const MES=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
function dateVal(s){if(!s)return 9e15;const t=Date.parse(s);return isNaN(t)?9e15:t;}
function dueLabel(s){if(!s)return 'sin fecha';const dt=new Date(s+'T00:00:00');return isNaN(dt)?s:dt.getDate()+' '+MES[dt.getMonth()];}
function quincenaData(q){
  const x=(q===activeQ)?d:load(q);
  return {payday:x.payday||'', income:sum(x.inc), nec:sumCash(x.nec), luj:sumCash(x.luj), tarj:sumTj(x.nec)+sumTj(x.luj)};
}
function prio(r){if(r.status==='full')return r.min>=r.total-0.005?0:1;return r.status==='part'?2:3;}
function computePlan(){
  const me=quincenaData(activeQ);
  const perQ = me.payday!=='';
  const start=dateVal(me.payday);
  // Fin de la ventana = inicio del PRÓXIMO ciclo por fecha (así cada deuda/cuota cae en su ciclo).
  let end=Infinity, nextPay='';
  cycles.forEach(c=>{if(c.id===activeQ)return;const s=dateVal(cyclePayday(c.id));if(s<9e14&&s>start&&s<end){end=s;nextPay=cyclePayday(c.id);}}); // s<9e14 ignora ciclos sin fecha (centinela 9e15)
  if(!isFinite(end) || !(end>start)){const days=(cycleOf(activeQ).type==='m'?30:15);end=start+days*864e5;} // sin próximo ciclo válido → ventana por tipo (15 ó 30 días)
  const list = perQ ? debts.filter(x=>{const v=dateVal(x.vence);return v>=start && v<end;}) : []; // sin fecha → sin deudas (no todas)
  const outCount = perQ ? debts.length-list.length : 0;
  const minTotal=list.reduce((t,x)=>t+(parseFloat(x.min)||0),0);
  const forDebt=me.income-me.nec-me.luj;
  let pool=Math.max(forDebt-minTotal,0);const poolInit=pool;
  // Pago = SOLO el mínimo de cada deuda. La app no reparte ni inventa abonos.
  const base=list.map(x=>{const min=parseFloat(x.min)||0,total=parseFloat(x.total)||0;return {n:x.n,vence:x.vence,total,min,pay:Math.min(min,total)};});
  base.forEach(r=>{r.revolve=Math.max(r.total-r.pay,0);r.status=r.revolve<=0.005?'full':'min';
    r.why=r.status==='full'?'el mínimo ya la deja en cero':'pago mínimo';});
  base.sort((a,b)=>(prio(a)-prio(b))||(dateVal(a.vence)-dateVal(b.vence))||(a.total-b.total));
  base.forEach((r,i)=>r.rank=i+1);
  base.forEach(r=>{r.paid=!!(d&&d.paid&&d.paid[r.n]);}); // ¿ya marcado como pagado este ciclo?
  const rows=base;
  const paidSum=rows.filter(r=>r.paid).reduce((t,r)=>t+r.pay,0);
  const pendingSum=rows.filter(r=>!r.paid).reduce((t,r)=>t+r.pay,0);
  // Sugerencia (sin tocar montos): a cuál abonar lo que sobra. La más cercana a cero primero.
  const cand=base.filter(r=>r.revolve>0.5).sort((a,b)=>a.revolve-b.revolve)[0];
  let suggest=null;
  if(poolInit>0.5 && cand){const ab=Math.min(poolInit,cand.revolve);
    suggest={card:cand.n,amount:ab,leaves:cand.revolve-ab,clears:ab>=cand.revolve-0.005};}
  const ess=me.nec+minTotal, comfy=ess+me.luj;
  let statusCode, needsGap=0;
  if(me.income>=comfy) statusCode='greenlux';
  else if(me.income>=ess) statusCode='green';
  else if(me.income>=minTotal){statusCode='tarjeteo'; needsGap=ess-me.income;}
  else statusCode='red';
  return {rows,perQ,payday:me.payday,
    nextPayday:nextPay||'',
    inc:me.income,vida:me.nec+me.luj,nec:me.nec,luj:me.luj,tarj:me.tarj,minTotal,statusCode,needsGap,forDebt,poolInit,
    short:Math.max(minTotal-forDebt,0),crisis:statusCode==='red',outCount,suggest,
    monthInc:cycles.reduce((t,c)=>t+quincenaData(c.id).income,0),
    paySum:rows.reduce((t,r)=>t+r.pay,0),revolveSum:rows.reduce((t,r)=>t+r.revolve,0),paidSum,pendingSum};
}

  const ranked=cards.filter(c=>util(c)!=null).sort((a,b)=>{
    const ua=util(a),ub=util(b),oa=ua>1?1:0,ob=ub>1?1:0;

    return dateVal(a.vence)-dateVal(b.vence);
  });
  const prio=ranked.length?'<div class="sa-prio"><b>Paga primero:</b> '+ranked.slice(0,3).map((c,k)=>(k+1)+') '+esc(c.n)+(util(c)>1?' (¡sobre el tope!)':' ('+Math.round(util(c)*100)+'%)')).join('  ·  ')+'</div>':'';
  return '<div class="salud"><div class="sa-h">💳 Salud de tus tarjetas · usado vs línea (sano &lt;30%)</div>'+rows+'<div class="sa-verdict">'+verdict+'</div>'+prio+'</div>';
}
function allToCash(){
  if(!confirm('¿Pasar TODOS tus gastos a efectivo (quitar el tarjeteo en todas las quincenas)? Las cuotas futuras de esos gastos desaparecen.'))return;
  cycles.forEach(c=>{const x=(c.id===activeQ)?d:load(c.id);
    ['nec','luj'].forEach(g=>{(x[g]||[]).forEach(cat=>{
      if(cat.tj){cat.tj=false;delete cat.tjCard;delete cat.tjCuotas;}
      if(cat.sub)cat.sub.forEach(s=>{if(s.tj){s.tj=false;delete s.tjCard;delete s.tjCuotas;}});
    });});
    if(c.id===activeQ){save();}else{localStorage.setItem(keyFor(c.id),JSON.stringify(x));}});
  if(typeof reconcileTjDebts==='function')reconcileTjDebts();
  render();renderDebts();
}
function renderDebts(){
  const el=document.getElementById('debts');if(!el)return;
  el.innerHTML=
    '<div id="debts-mgmt">'+
      '<h2>Deudas y tarjetas</h2>'+
      '<div class="dnote">Tus obligaciones reales. La app calcula qué pagar primero con el ingreso del mes (suma de ambas quincenas). Tus datos nunca salen de tu compu.</div>'+
      saludH()+
      '<div class="dhead"><span>Deuda</span><span class="r">Total</span><span class="r">Línea</span><span class="r">Mín</span><span>Vence</span><span></span></div>'+
      debts.map((x,i)=>x.auto?'':debtRowH(x,i)).join('')+
      '<button class="add" data-dadd="1"><span class="p">+</span> Agregar deuda</button>'+
      '<button class="cuotas-toggle" data-cuotas="1">📅 Cuotas futuras de tarjeta'+cuotasCountH()+'</button>'+
      '<button class="cuotas-toggle" data-allcash="1">💵 Pasar todo a efectivo (quitar tarjeteo)</button>'+
      '<div id="autodebts" style="display:none">'+autoDebtsH()+'</div>'+
      '<div class="plan" id="tjbox">'+tjInner()+'</div>'+
    '</div>'+
    '<div class="plan" id="planbox">'+planInner(computePlan())+'</div>';
  if(typeof applyView==='function')applyView();
}
const debtsEl=document.getElementById('debts');
debtsEl.addEventListener('input',e=>{const t=e.target;if(!t.dataset)return;
  if(t.dataset.tj!==undefined){tj[t.dataset.tj]=t.value;saveTJ();refreshTJ();return;}
  if(t.dataset.di===undefined)return;
  debts[+t.dataset.di][t.dataset.df]=t.value;saveDebts();refreshPlan();});
debtsEl.addEventListener('click',e=>{const b=e.target.closest('button');if(!b)return;
  if(b.dataset.dadd){debts.push({n:'Nueva deuda',total:0,min:0,vence:''});saveDebts();renderDebts();}
  else if(b.dataset.cuotas){const el=document.getElementById('autodebts');if(el){el.innerHTML=autoDebtsH();el.style.display=el.style.display==='none'?'':'none';}}
  else if(b.dataset.allcash){allToCash();}
  else if(b.dataset.paid!==undefined){const n=b.dataset.paid;if(!d.paid)d.paid={};if(d.paid[n])delete d.paid[n];else d.paid[n]=true;save();refreshPlan();recompute();}
  else if(b.dataset.drm!==undefined){debts.splice(+b.dataset.drm,1);saveDebts();renderDebts();}});

// Tabs de nivel superior (Inicio · Plan · Deudas · Informe).
document.querySelector('.tabbar').addEventListener('click',e=>{const b=e.target.closest('.tabbtn');if(!b)return;
  view=b.dataset.view;
  if(view==='inicio')focusMode=false; // el corazón = las 3 cajas (overview), no el wizard
  applyView();window.scrollTo({top:0,behavior:'smooth'});});

// ===== Primer arranque (onboarding): elegir ciclo antes de ver nada =====
function isFirstRun(){
  if(localStorage.getItem('midas_onboarded')) return false;
  if(localStorage.getItem('midas_cycles')) return false;
  if(localStorage.getItem('midas_pp_v1')) return false;
  if(localStorage.getItem('midas_pp_q1')) return false;
  return true;
}
function showWelcome(show){const w=document.getElementById('welcome');if(w)w.hidden=!show;document.body.classList.toggle('welcoming',show);}
function chooseCycle(type){ // 'q' quincenal | 'm' mensual
  cycles=[{id:'c1',type:type,label:type==='m'?'Mes 1':'Quincena 1'}];saveCycles();
  activeQ='c1';localStorage.setItem('midas_active_cycle',activeQ);localStorage.setItem('midas_onboarded','1');
  d=def();save();showWelcome(false);view='inicio';incEdit=true;render();renderDebts();window.scrollTo({top:0});
}
document.getElementById('welcome').addEventListener('click',e=>{const b=e.target.closest('[data-cyc-type]');if(b)chooseCycle(b.dataset.cycType);});

if(isFirstRun()){showWelcome(true);}
else{render();renderDebts();}

// PWA: registrar el service worker para que la app abra offline e instale en el teléfono.
// Solo aplica servida por http(s). En el escritorio (pywebview en 127.0.0.1) no estorba:
// si falla el registro, se ignora — la app funciona igual.
// Solo en producción (dominio real). En localhost NO registramos SW, para que el desarrollo
// no quede atrapado en caché vieja (cada Ctrl+R trae la versión fresca). En el host real/celular
// sí se registra → offline e instalable.
const _isLocal = ['localhost','127.0.0.1',''].includes(location.hostname);
if('serviceWorker' in navigator && location.protocol!=='file:' && !_isLocal){
  window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));
}
</script>
