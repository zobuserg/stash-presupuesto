function toggleDebtPaid(name){
  if(!d.paid)d.paid={}; if(!d.paidAmt)d.paidAmt={}; if(!d.paidFields)d.paidFields={};
  const x=debts.find(z=>z.n===name);
  if(d.paid[name]){ // destildar: restaura los campos guardados (saldo/disponible/mín/mes)
    snapshot();
    if(x&&!x.auto){ const pf=d.paidFields[name]; if(pf){ ['total','disp','min','mes'].forEach(k=>{ if(pf[k]!==undefined)x[k]=pf[k]; }); } }
    delete d.paid[name]; delete d.paidAmt[name]; delete d.paidFields[name];
  } else { // marcar: asienta el pago. pago = lo que pagaste (cuenta como real / ejecutado)
    let pago=0;
    if(x&&!x.auto){
      pago=debtAmt(x,(d.debtPay&&d.debtPay[name])||'min');
      if(isCardDebt(x)){
        // tarjeta: el pago LIBERA disponible. El saldo se deriva de línea − disponible.
        const oldDisp=parseFloat(x.disp)||0;
        const inp=prompt('Pagaste '+pe(pago)+' a "'+name+'".\n\nNuevo DISPONIBLE de la tarjeta — subió ~'+pe(pago)+', pero el interés puede dejarlo en menos. Pon el que ves en tu banco:', Math.round(oldDisp+pago));
        if(inp===null) return; // canceló
        snapshot();
        d.paidFields[name]={total:x.total, disp:x.disp, min:x.min, mes:x.mes};
        const nd=parseFloat(inp), newDisp=isNaN(nd)?oldDisp+pago:Math.max(nd,0);
        x.disp=newDisp; x.total=Math.max((parseFloat(x.limite)||0)-newDisp,0); x.min=''; x.mes='';
      } else {
        // préstamo: baja el saldo por el pago. Mín/mes son la cuota fija — no se borran ni se pregunta.
        snapshot();
        d.paidFields[name]={total:x.total};
        x.total=Math.max((parseFloat(x.total)||0)-pago,0);
      }
    } else { snapshot(); }
    d.paid[name]=true; d.paidAmt[name]=pago;
  }
  saveDebts(); save(); render(); if(typeof renderDebts==='function')renderDebts();
}
// Ejecutado/real POR CAJA: lo ya marcado como pagado. nec/luj = gastos en efectivo con ✓;
// aho = pagos de deuda asentados (los checks de deuda viven en Ahorro).
function ejecutadoPorGrupo(){
  const r={aho:0,nec:0,luj:0};
  ['nec','luj'].forEach(g=>{(d[g]||[]).forEach((row,i)=>{
    const padre=!!(d.itemPaid&&d.itemPaid[g+'-'+i]); // marcar el padre cuenta toda la categoría
    if(hasSubs(row)){
      if(!row.tj) row.sub.forEach((s,j)=>{ if((padre||(d.itemPaid&&d.itemPaid[g+'-'+i+'-'+j]))&&!s.tj) r[g]+=parseFloat(s.a)||0; });
    } else {
      if(padre&&!row.tj) r[g]+=parseFloat(row.a)||0;
    }
  });});
  if(d.paid){ debts.filter(x=>!x.auto).forEach(x=>{ if(d.paid[x.n]) r.aho+=(parseFloat(d.paidAmt&&d.paidAmt[x.n])||debtAmt(x,(d.debtPay&&d.debtPay[x.n])||'min')); }); }
  return r;
}
function ejecutadoSum(){const r=ejecutadoPorGrupo();return r.aho+r.nec+r.luj;}

const TJ_KEY='midas_tarjeteo';
function loadTJ(){try{return JSON.parse(localStorage.getItem(TJ_KEY))||{};}catch(e){return {};}}

function tjCompute(){
  const monto=parseFloat(tj.monto)||0, cuotas=Math.max(parseInt(tj.cuotas)||3,1);
  const cuotaReal=parseFloat(tj.cuotaReal)||0;
  const cuota=cuotaReal>0?cuotaReal:(monto/cuotas);
  const total=cuota*cuotas;
  return {monto,cuotas,cuota,total,sobre:Math.max(total-monto,0)};
}
function tjInner(){
  const r=tjCompute();
  return '<div class="plan-h">Simulador de tarjeteo</div>'+

function saludH(){
  const cards=debts.filter(isCardDebt);
  if(!cards.length) return '';
  const util=c=>{const l=parseFloat(c.limite)||0,s=parseFloat(c.total)||0;return l>0?s/l:null;};
  const totL=cards.reduce((t,c)=>t+(parseFloat(c.limite)||0),0);
  const totS=cards.reduce((t,c)=>t+(parseFloat(c.total)||0),0);
  const totU=totL>0?totS/totL:0;
  const cls=u=>u==null?'':(u>0.7?'sa-red':(u>0.3?'sa-amber':'sa-green'));
  const rows=cards.map(c=>{const u=util(c);
    return '<div class="sa-row"><span class="sa-n">'+esc(c.n)+'</span><span class="sa-bar"><span class="sa-fill '+cls(u)+'" style="width:'+(u==null?0:Math.min(u*100,100))+'%"></span></span><span class="sa-pct '+cls(u)+'">'+(u==null?'sin línea':Math.round(u*100)+'%')+'</span></div>';
  }).join('');
  const verdict= totU>1?'🔴 Debes más crédito del que tienes. Lo urgente: bajar deuda, no sumar más a tarjeta.'
    : totU>0.7?'🔴 Uso muy alto ('+Math.round(totU*100)+'%). Cada compra a tarjeta es deuda cara — paga en efectivo y abona.'
    : totU>0.3?'🟡 Uso medio ('+Math.round(totU*100)+'%). Ojo con sumar más a tarjeta.'
    : '🟢 Uso sano ('+Math.round(totU*100)+'%). Vas bien.';
  const ranked=cards.filter(c=>util(c)!=null).sort((a,b)=>{
    const ua=util(a),ub=util(b),oa=ua>1?1:0,ob=ub>1?1:0;
    if(oa!==ob)return ob-oa;
    if(Math.abs(ub-ua)>0.05)return ub-ua;
    const ta=parseFloat(a.tcea)||0,tb=parseFloat(b.tcea)||0; if(ta!==tb)return tb-ta;
    return dateVal(a.vence)-dateVal(b.vence);
  });
  const prio=ranked.length?'<div class="sa-prio"><b>Paga primero:</b> '+ranked.slice(0,3).map((c,k)=>(k+1)+') '+esc(c.n)+(util(c)>1?' (¡sobre el tope!)':' ('+Math.round(util(c)*100)+'%)')).join('  ·  ')+'</div>':'';
  return '<div class="salud"><div class="sa-h">💳 Salud de tus tarjetas · usado vs línea (sano &lt;30%)</div>'+rows+'<div class="sa-verdict">'+verdict+'</div>'+prio+'</div>';
}

/* ===== Advisor — recomienda la jugada, la compara con lo que tienes, y la aplica de un toque ===== */
function advisorRank(){ // tarjetas por urgencia: sobre-tope, utilización, tasa, vencimiento
  const cards=debts.filter(isCardDebt);
  const util=c=>{const l=parseFloat(c.limite)||0,s=parseFloat(c.total)||0;return l>0?s/l:null;};
  return cards.filter(c=>(parseFloat(c.total)||0)>0).sort((a,b)=>{
    const ua=util(a),ub=util(b),oa=(ua!=null&&ua>1)?1:0,ob=(ub!=null&&ub>1)?1:0;
    if(oa!==ob)return ob-oa;
    if(ua!=null&&ub!=null&&Math.abs(ub-ua)>0.05)return ub-ua;
    const ta=parseFloat(a.tcea)||0,tb=parseFloat(b.tcea)||0;if(ta!==tb)return tb-ta;
    const sa=parseFloat(a.total)||0,sb=parseFloat(b.total)||0;if(sa!==sb)return sb-sa;
    return dateVal(a.vence)-dateVal(b.vence);
  });
}
function advisorPlan(){
  const cards=debts.filter(isCardDebt);
  const allDebts=debts.filter(x=>!x.auto);
  const totL=cards.reduce((t,c)=>t+(parseFloat(c.limite)||0),0);
  const totS=cards.reduce((t,c)=>t+(parseFloat(c.total)||0),0);
  const totU=totL>0?totS/totL:0;
  const tjActual=sumTj(d.nec)+sumTj(d.luj);
  const stressed = totU>0.3 || cards.some(c=>{const l=parseFloat(c.limite)||0,s=parseFloat(c.total)||0;return l>0&&s/l>1;}) || cards.some(c=>(parseFloat(c.tcea)||0)>30) || cards.some(c=>esDeudaCara(c)&&(parseFloat(c.total)||0)>0);
  const sel=d.debtPay||{};
  return {cards,allDebts,totU,tjActual,recEfectivo:tjActual>0&&stressed,faltanMin:allDebts.filter(x=>!sel[x.n]),prio:advisorRank()[0]||null,saldo:lastSaldo||0,selCount:Object.keys(sel).length};
}

  const compH = comp.length?'<div class="adv-comp"><div class="ac-h">Lo que tienes vs. lo que recomiendo</div>'+
    '<div class="ac-row ac-head"><span></span><span>Tú</span><span>Recomiendo</span></div>'+
    comp.map(r=>'<div class="ac-row'+(r[3]?' ac-diff':'')+'"><span class="ac-k">'+r[0]+'</span><span class="ac-you">'+r[1]+'</span><span class="ac-rec">'+r[2]+(r[3]?' ⚠':' ✓')+'</span></div>').join('')+'</div>':'';
  const apply = comp.some(r=>r[3])?'<button class="adv-apply" data-applyadvisor="1">✓ Aplicar tal cual</button><div class="adv-or">o haz los cambios a mano arriba — tú mandas.</div>':'';
  return '<div class="advisor"><div class="adv-h">🧠 Tu jugada esta quincena</div>'+pasosH+compH+apply+'</div>';

      debts.map((x,i)=>x.auto?'':debtRowH(x,i)).join('')+
      '<button class="add" data-dadd="1"><span class="p">+</span> Agregar deuda</button>'+
      '<button class="cuotas-toggle" data-cuotas="1">📅 Cuotas futuras de tarjeta'+cuotasCountH()+'</button>'+
      '<button class="cuotas-toggle" data-allcash="1">💵 Pasar todo a efectivo (quitar tarjeteo)</button>'+
      '<div id="autodebts" style="display:none">'+autoDebtsH()+'</div>'+
      '<div class="plan" id="tjbox">'+tjInner()+'</div>'+
    '</div>'+
    '<div id="advisorbox">'+advisorH()+'</div>'+
    '<div class="plan" id="planbox">'+planInner(computePlan())+'</div>';
  if(typeof applyView==='function')applyView();
}
const debtsEl=document.getElementById('debts');
debtsEl.addEventListener('input',e=>{const t=e.target;if(!t.dataset)return;
  if(t.dataset.tj!==undefined){tj[t.dataset.tj]=t.value;saveTJ();refreshTJ();return;}
  if(t.dataset.di===undefined)return;
  const i=+t.dataset.di; debts[i][t.dataset.df]=t.value;
  if(isCardDebt(debts[i])&&(t.dataset.df==='limite'||t.dataset.df==='disp')){ // tarjeta: el saldo se deriva de línea − disponible
    debts[i].total=Math.max((parseFloat(debts[i].limite)||0)-(parseFloat(debts[i].disp)||0),0);
    const dn=t.closest('.drow2'),de=dn&&dn.querySelector('.dr-debe b'); if(de)de.textContent=pe(debts[i].total);
  }
  saveDebts();refreshPlan();});
debtsEl.addEventListener('click',e=>{const b=e.target.closest('button');if(!b)return;
  if(b.dataset.dadd){debts.push({n:'Nueva deuda',total:0,min:0,vence:''});saveDebts();renderDebts();}
  else if(b.dataset.cuotas){const el=document.getElementById('autodebts');if(el){el.innerHTML=autoDebtsH();el.style.display=el.style.display==='none'?'':'none';}}
  else if(b.dataset.allcash){allToCash();}
  else if(b.dataset.applyadvisor){applyAdvisor();}
  else if(b.dataset.paid!==undefined){toggleDebtPaid(b.dataset.paid);}
  else if(b.dataset.drm!==undefined){debts.splice(+b.dataset.drm,1);saveDebts();renderDebts();}});

// Tabs de nivel superior (Inicio · Plan · Deudas · Informe).
document.querySelector('.tabbar').addEventListener('click',e=>{const b=e.target.closest('.tabbtn');if(!b)return;
  view=b.dataset.view;
  if(view==='inicio')focusMode=false; // el corazón = las 3 cajas (overview), no el wizard
  applyView();window.scrollTo({top:0,behavior:'smooth'});});

// ===== Primer arranque (onboarding): elegir ciclo antes de ver nada =====
function isFirstRun(){
  if(localStorage.getItem('midas_onboarded')) return false;
  if(localStorage.getItem('midas_cycles')) return false;
  if(localStorage.getItem('midas_pp_v1')) return false;
  if(localStorage.getItem('midas_pp_q1')) return false;
  return true;
}
function showWelcome(show){const w=document.getElementById('welcome');if(w)w.hidden=!show;document.body.classList.toggle('welcoming',show);}
let welMode='m', welHalf=1, welMonth='', welMonto=0;
function welPeriodH(){
  const mo='<label class="wel-pl">Mes<input type="month" id="wel-month" value="'+welMonth+'"></label>';
  if(welMode==='m')return mo;
  if(welMode==='q')return mo+'<div class="wel-half"><button data-welhalf="1" class="'+(welHalf===1?'on':'')+'">1ra · 1–15</button><button data-welhalf="2" class="'+(welHalf===2?'on':'')+'">2da · 16–fin</button></div>';
  return '<label class="wel-pl">Desde<input type="date" id="wel-from"></label><label class="wel-pl">Hasta<input type="date" id="wel-to"></label>';
}
function renderWelPeriod(){const e=document.getElementById('wel-period');if(e)e.innerHTML=welPeriodH();
  document.querySelectorAll('.wel-mode').forEach(b=>b.classList.toggle('on',b.dataset.welmode===welMode));}
function welNext(){ // paso 1 (monto) -> paso 2 (periodo)
  welMonto=parseFloat((document.getElementById('wel-monto')||{}).value)||0;
  const s1=document.getElementById('wel-step1'),s2=document.getElementById('wel-step2');
  if(s1)s1.hidden=true; if(s2)s2.hidden=false;
  const t=new Date(); welMonth=t.getFullYear()+'-'+String(t.getMonth()+1).padStart(2,'0');
  renderWelPeriod();
}
function finishOnboarding(){
  let start='', end='', type=welMode;
  if(welMode==='m'||welMode==='q'){
    const mv=(document.getElementById('wel-month')||{}).value||welMonth;
    const pp=mv.split('-'), y=+pp[0], m=+pp[1];
    if(welMode==='m'){ start=mv+'-01'; end=mv+'-'+String(lastDay(y,m)).padStart(2,'0'); }
    else if(welHalf===1){ start=mv+'-01'; end=mv+'-15'; }
    else { start=mv+'-16'; end=mv+'-'+String(lastDay(y,m)).padStart(2,'0'); }
  } else {
    start=(document.getElementById('wel-from')||{}).value||'';
    end=(document.getElementById('wel-to')||{}).value||'';
  }
  cycles=[{id:'c1',type:type,start:start,end:end,label:'Ciclo 1'}];saveCycles();
  activeQ='c1';localStorage.setItem('midas_active_cycle',activeQ);localStorage.setItem('midas_onboarded','1');
  d=def(); d.inc=[{l:'Presupuesto',a:welMonto}]; save();
  showWelcome(false);view='inicio';incEdit=false;render();renderDebts();window.scrollTo({top:0});
}
document.getElementById('welcome').addEventListener('click',e=>{
  if(e.target.closest('[data-welnext]')){welNext();return;}
  const md=e.target.closest('[data-welmode]'); if(md){welMode=md.dataset.welmode;renderWelPeriod();return;}
  const hf=e.target.closest('[data-welhalf]'); if(hf){welHalf=+hf.dataset.welhalf;renderWelPeriod();return;}
  if(e.target.closest('[data-finishonb]'))finishOnboarding();
});

if(isFirstRun()){showWelcome(true);}
else{render();renderDebts();}

// PWA: registrar el service worker para que la app abra offline e instale en el teléfono.
// Solo aplica servida por http(s). En el escritorio (pywebview en 127.0.0.1) no estorba:
// si falla el registro, se ignora — la app funciona igual.
// Solo en producción (dominio real). En localhost NO registramos SW, para que el desarrollo
// no quede atrapado en caché vieja (cada Ctrl+R trae la versión fresca). En el host real/celular
// sí se registra → offline e instalable.
const _isLocal = ['localhost','127.0.0.1',''].includes(location.hostname);
if('serviceWorker' in navigator && location.protocol!=='file:' && !_isLocal){
  window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));
}

/* ===== Gestos táctiles (celular): jalar-para-refrescar + swipe entre ciclos ===== */
(function(){
  if(!('ontouchstart' in window)) return; // solo en pantallas táctiles
  // --- Jalar hacia abajo (en el tope) para recargar ---
  const ptr=document.createElement('div'); ptr.id='ptr'; ptr.innerHTML='<span class="ptr-i">↻</span>';
  document.body.appendChild(ptr);
  let py=0, pulling=false, dist=0; const PT=70;
  document.addEventListener('touchstart',e=>{
    if(window.scrollY<=0 && e.touches.length===1){py=e.touches[0].clientY;pulling=true;dist=0;}
    else pulling=false;
  },{passive:true});
  document.addEventListener('touchmove',e=>{
    if(!pulling)return;
    dist=e.touches[0].clientY-py;
    if(dist>0){
      if(e.cancelable)e.preventDefault(); // suprime el rebote y el pull nativo, gana el nuestro
      const d=Math.min(dist,110);
      ptr.style.transform='translateX(-50%) translateY('+d+'px)';
      ptr.style.opacity=Math.min(dist/PT,1);
      ptr.classList.toggle('ready',dist>PT);
    } else { pulling=false; ptr.style.opacity=0; }
  },{passive:false});
  document.addEventListener('touchend',()=>{
    if(!pulling)return; pulling=false;
    if(dist>PT){ ptr.classList.add('go'); location.reload(); }
    else { ptr.style.transform=''; ptr.style.opacity=0; ptr.classList.remove('ready'); }
  });
  // --- Swipe horizontal → ciclo siguiente (izquierda) / anterior (derecha) ---
  let sx=0,sy=0,stime=0,track=false;
  document.addEventListener('touchstart',e=>{
    if(e.touches.length!==1){track=false;return;}
    const t=e.touches[0];
    if(t.clientX<24||t.clientX>window.innerWidth-24){track=false;return;} // borde = gesto "atrás" del navegador
    sx=t.clientX;sy=t.clientY;stime=Date.now();track=true;
  },{passive:true});
  let toastT=null;
  function cycleToast(label){
    let el=document.getElementById('cyc-toast');
    if(!el){el=document.createElement('div');el.id='cyc-toast';document.body.appendChild(el);}
    el.textContent=label; el.classList.add('show');
    clearTimeout(toastT); toastT=setTimeout(()=>el.classList.remove('show'),1100);
  }
  document.addEventListener('touchend',e=>{
    if(!track)return; track=false;
    const t=e.changedTouches[0], dx=t.clientX-sx, dy=t.clientY-sy;
    if(Date.now()-stime<600 && Math.abs(dx)>80 && Math.abs(dx)>Math.abs(dy)*2){
      if(typeof cycles==='undefined'||!cycles.length)return;
      const idx=cycles.findIndex(c=>c.id===activeQ); let ni=idx;
      if(dx<0 && idx<cycles.length-1) ni=idx+1;        // swipe izquierda → siguiente
      else if(dx>0 && idx>0) ni=idx-1;                  // swipe derecha → anterior
      if(ni!==idx){ switchCycle(cycles[ni].id); cycleToast(cycleLabel(cycles[ni])); }
    }
  },{passive:true});
})();
</script>
