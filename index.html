<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Stash — 50/30/20</title>
<!-- PWA: instalable en el teléfono. Los satélites (manifest/sw/íconos) viven junto al HTML. -->
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#fbfbfd" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Stash">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
:root{
  --bg:#fbfbfd; --card:#ffffff; --tx:#1d1d1f; --tx2:#86868b; --tx3:#aeaeb2;
  --line:rgba(0,0,0,.07); --line2:rgba(0,0,0,.045);
  --ok:#1d8a5f; --ok-bg:rgba(29,138,95,.10);
  --bad:#d13b3b; --bad-bg:rgba(209,59,59,.10);
  --accent:#0071e3;
  --shadow:0 1px 3px rgba(0,0,0,.05),0 1px 2px rgba(0,0,0,.03);
  --rad:18px; --rad-sm:11px;
}
@media(prefers-color-scheme:dark){:root:not([data-theme="light"]){
  --bg:#000000; --card:#1c1c1e; --tx:#f5f5f7; --tx2:#98989d; --tx3:#636366;
  --line:rgba(255,255,255,.09); --line2:rgba(255,255,255,.06);
  --ok:#5fd3a0; --ok-bg:rgba(95,211,160,.13);
  --bad:#ff6961; --bad-bg:rgba(255,105,97,.14);
  --accent:#2997ff;
  --shadow:0 1px 3px rgba(0,0,0,.3);
}}
/* Tema manual (botón ☀️/🌙): fuerza oscuro aunque el sistema esté en claro. Mismos valores que el bloque de arriba. */
:root[data-theme="dark"]{
  --bg:#000000; --card:#1c1c1e; --tx:#f5f5f7; --tx2:#98989d; --tx3:#636366;
  --line:rgba(255,255,255,.09); --line2:rgba(255,255,255,.06);
  --ok:#5fd3a0; --ok-bg:rgba(95,211,160,.13);
  --bad:#ff6961; --bad-bg:rgba(255,105,97,.14);
  --accent:#2997ff;
  --shadow:0 1px 3px rgba(0,0,0,.3);
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",sans-serif;
  background:var(--bg); color:var(--tx);
  -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
  max-width:680px; margin:0 auto; padding:2.5rem 1.5rem 6rem;
  font-size:15px; line-height:1.5;
}
.head{margin-bottom:2rem; position:relative}
#undo{position:absolute; top:0; right:0; font:inherit; font-size:12.5px; font-weight:500;
  color:var(--accent); background:transparent; border:1px solid var(--line); cursor:pointer;
  padding:.42rem .85rem; border-radius:20px; transition:.15s}
#undo:hover{border-color:var(--accent)}
#undo[hidden]{display:none}
.head h1{font-size:28px; font-weight:600; letter-spacing:-.022em; margin-bottom:.65rem}
.month-wrap{display:inline-flex; align-items:center; gap:.4rem; color:var(--tx2); font-size:14px}
#month{
  font:inherit; font-size:14px; font-weight:500; color:var(--accent);
  background:transparent; border:none; border-bottom:1.5px dashed var(--line);
  padding:1px 2px 2px; min-width:120px; transition:border-color .2s;
}
#month:focus{outline:none; border-bottom-color:var(--accent)}
#month::placeholder{color:var(--tx3)}

/* Toggle quincenas */
.q-tabs{display:flex; gap:.45rem; margin-top:.85rem}
.q-tab{
  font:inherit; font-size:13px; font-weight:500;
  padding:.42rem 1rem; border-radius:20px; cursor:pointer; transition:.15s;
  border:1.5px solid var(--line); background:transparent; color:var(--tx2);
}
.q-tab.active{background:var(--accent); border-color:var(--accent); color:#fff}
.q-tab:not(.active):hover{border-color:var(--accent); color:var(--accent)}
.q-tab .qt-d{font-size:10px; opacity:.7; margin-left:.25rem}
.q-tab.addcyc{color:var(--tx3); border-style:dashed; font-weight:600}
.q-tabs{flex-wrap:wrap}

.sec{margin-top:2.25rem}
.sec-h{display:flex; align-items:baseline; justify-content:space-between; margin-bottom:.85rem}
.sec-h .t{font-size:13px; font-weight:600; letter-spacing:.02em; text-transform:uppercase; color:var(--tx2)}
.sec-h .pct{font-size:12px; font-weight:500; color:var(--tx3)}
.sec-h .tw{display:flex; align-items:center; gap:.55rem}
.num{flex:none; width:22px; height:22px; border-radius:50%; display:inline-flex; align-items:center; justify-content:center;
  font-size:12px; font-weight:700; color:#fff; font-variant-numeric:tabular-nums}
.num-nec{background:var(--accent)}
.num-luj{background:#e0922f}
.num-aho{background:var(--ok)}
.sec-note{font-size:13px; color:var(--tx2); margin:-.4rem 0 .9rem}

.meta{display:flex; align-items:center; gap:.5rem; font-size:13px; color:var(--tx2); margin-bottom:.6rem; flex-wrap:wrap}
.meta b{color:var(--tx); font-weight:600; font-variant-numeric:tabular-nums}
.tag{font-size:12px; font-weight:600; padding:2px 9px; border-radius:20px}
.tag.ok{color:var(--ok); background:var(--ok-bg)}
.tag.bad{color:var(--bad); background:var(--bad-bg)}

.bar{height:6px; border-radius:6px; background:var(--line2); overflow:hidden; margin-bottom:1rem}
.bar-fill{height:100%; width:0; border-radius:6px; background:var(--ok); transition:width .35s cubic-bezier(.4,0,.2,1),background .25s}

.row{display:flex; gap:.4rem; align-items:center; padding:.15rem 0}
.row input{font:inherit; color:var(--tx); background:transparent; border:none; padding:.55rem .2rem; transition:background .15s}
.row input.l{flex:1; min-width:0; border-bottom:1px solid var(--line2)}
/* Monto más angosto (antes 118px) → deja más ancho a la etiqueta para que el nombre de la categoría
   no se corte ("Transporte", "Educación" entran completos). Un monto rara vez pasa de 5-6 dígitos. */
.row input.a{width:78px; flex:none; text-align:right; font-weight:600; font-variant-numeric:tabular-nums; border-bottom:1px solid var(--line2)}
.row input:focus{outline:none; border-bottom-color:var(--accent)}
.row input.l::placeholder,.row input.a::placeholder{color:var(--tx3)}
input.saved{background:rgba(52,199,89,.20) !important}
.meta .eaten{color:var(--bad); font-weight:600}
.meta .eaten.pos{color:var(--ok)}
.meta .eaten.neutral{color:var(--accent)}
.wizgo{display:none; width:100%; margin-top:1rem; padding:.75rem; border:none; border-radius:var(--rad-sm); background:var(--accent); color:#fff; font:inherit; font-weight:600; font-size:13px; cursor:pointer; transition:.15s}
.wizgo:hover{filter:brightness(1.08)}
.rollover{background:var(--card); border:1px solid var(--line); border-radius:var(--rad); box-shadow:var(--shadow); padding:1.2rem 1.3rem; margin-top:1rem}
.ro-back{border:none; background:transparent; color:var(--tx2); font:inherit; font-size:12.5px; cursor:pointer; padding:.1rem .2rem; margin-bottom:.6rem}
.ro-back:hover{color:var(--accent)}
.ro-h{font-size:13px; color:var(--tx2); line-height:1.5; margin-bottom:1rem}
.ro-h b{color:var(--tx)}
.ro-grid{display:grid; grid-template-columns:1fr 1fr 1fr; gap:.7rem}
.ro-card{background:var(--line2); border-radius:var(--rad-sm); padding:.9rem .8rem; text-align:center}
.ro-t{font-size:12px; color:var(--tx2); margin-bottom:.35rem}
.ro-v{font-size:19px; font-weight:700; color:var(--ok); font-variant-numeric:tabular-nums}
.ro-sub{font-size:10.5px; color:var(--tx3); margin-top:.2rem}
/* Modo enfocado (wizard) */
body.focuson .wizgo{display:none}
body.focuson .reset{display:none}
.splitprev{margin-top:1rem; padding-top:.9rem; border-top:1px solid var(--line2)}
.sp-h{font-size:11px; text-transform:uppercase; letter-spacing:.04em; color:var(--tx3); margin-bottom:.6rem}
.sp-grid{display:grid; grid-template-columns:1fr 1fr 1fr; gap:.6rem}
.sp-c{background:var(--line2); border-radius:var(--rad-sm); padding:.7rem .5rem; text-align:center; display:flex; flex-direction:column; gap:.15rem}
.sp-c span{font-size:11.5px; color:var(--tx2)}
.sp-c b{font-size:16px; font-weight:700; color:var(--tx); font-variant-numeric:tabular-nums}
.sp-c i{font-size:10px; color:var(--tx3); font-style:normal}
.sp-note{font-size:11.5px; color:var(--tx3); line-height:1.5; margin-top:.7rem}
.sp-note b{color:var(--accent)}
.focusnav{display:flex; align-items:center; justify-content:space-between; gap:.6rem; position:sticky; bottom:0; background:var(--bg); padding:.7rem 0 .5rem; margin-top:1rem; border-top:1px solid var(--line)}
.fn-btn{border:1px solid var(--line); background:var(--card); color:var(--tx); font:inherit; font-size:13px; font-weight:600; padding:.6rem 1rem; border-radius:var(--rad-sm); cursor:pointer; transition:.15s}
.fn-btn:hover{border-color:var(--accent); color:var(--accent)}
.fn-btn.primary{background:var(--accent); color:#fff; border-color:var(--accent)}
.fn-btn.primary:hover{filter:brightness(1.08); color:#fff}
.fn-lbl{font-size:12px; color:var(--tx2); text-align:center; flex:1}
.fn-toggle{display:block; margin:.5rem auto 0; border:none; background:transparent; color:var(--tx3); font:inherit; font-size:12px; cursor:pointer; padding:.3rem}
.fn-toggle:hover{color:var(--accent)}
/* Plan quincenal: número hero + detalle colapsable */
.hero-left{text-align:center; padding:1.1rem 1rem .9rem; background:var(--ok-bg); border-radius:var(--rad-sm); margin:.8rem 0 .4rem}
.hl-lbl{font-size:12px; color:var(--tx2); margin-bottom:.3rem}
.hl-val{font-size:34px; font-weight:800; color:var(--ok); font-variant-numeric:tabular-nums; letter-spacing:-.02em; line-height:1}
.hl-val.zero{color:var(--tx2)}
.hl-sub{font-size:11.5px; color:var(--tx3); margin-top:.35rem}
.plan-detail{margin-top:.5rem}
.plan-detail>summary{cursor:pointer; font-size:12px; color:var(--tx2); padding:.4rem 0; list-style:none}
.plan-detail>summary::-webkit-details-marker{display:none}
.plan-detail>summary::before{content:'▸ '; color:var(--tx3)}
.plan-detail[open]>summary::before{content:'▾ '}
.ln-red{font-size:12px; color:var(--bad); font-weight:600; line-height:1.45; margin-top:.35rem}
.ln-mg{font-size:12px; color:var(--accent); font-weight:600; line-height:1.45; margin-top:.25rem; text-decoration:underline dotted; text-underline-offset:3px}
.ln-mg.neg{color:var(--bad); text-decoration:none}
/* padding lateral = .9rem + 1px (el padding + borde de las cajas .sec-tint) para que las 5 columnas
   del macro queden ALINEADAS verticalmente con las 5 columnas de cada caja. */
.heart.macro-card{background:none; border:none; box-shadow:none; padding:0 calc(.9rem + 1px) .7rem; margin:.4rem 0 1.1rem; border-bottom:1px solid var(--line)}
.macro{display:grid; grid-template-columns:1fr 1fr 1fr; gap:.4rem; text-align:center}
.macro .mc{display:flex; flex-direction:column; gap:.2rem; min-width:0}
.macro .mc-l{font-size:10.5px; color:var(--tx3); font-weight:500; text-transform:uppercase; letter-spacing:.02em}
.macro .mc-v{font-size:16px; font-weight:800; color:var(--tx); font-variant-numeric:tabular-nums; letter-spacing:-.01em}
/* Tríada por sección: Presupuestado · Utilizado · Disponible (alineada con el macro) */
.triad{display:grid; grid-template-columns:1fr 1fr 1fr; gap:.4rem; text-align:center; margin:.4rem 0 .6rem}
.triad .tr{display:flex; flex-direction:column; gap:.12rem; min-width:0}
.triad .tr i{font-size:9.5px; color:var(--tx3); font-weight:500; font-style:normal; text-transform:uppercase; letter-spacing:.02em}
.triad .tr b{font-size:13px; font-weight:800; color:var(--tx); font-variant-numeric:tabular-nums}
.macro .mc-v.tr-util,.triad .tr b.tr-util{color:#e0872b}
.rb-pct{color:var(--tx3); font-size:11px}
/* Selector de abono a deuda */
.abono-pick{margin-top:.7rem; display:flex; flex-direction:column; gap:.35rem}
.ap-h{font-size:12.5px; color:var(--tx2); margin-bottom:.2rem}
.ap-btn{display:flex; justify-content:space-between; align-items:center; gap:.5rem; font:inherit; font-size:13px; text-align:left; border:none; background:var(--card); color:var(--tx); border-radius:9px; padding:.55rem .7rem; cursor:pointer; transition:.15s}
.ap-btn:hover{background:var(--accent); color:#fff}
.ap-deb{font-size:11px; color:var(--tx3)}
.ap-btn:hover .ap-deb{color:#fff}
.ap-empty{font-size:12.5px; color:var(--tx2)}
/* Botón de cuotas futuras */
.cuotas-toggle{display:block; width:100%; margin-top:.6rem; padding:.6rem; border:1px solid var(--line); background:transparent; color:var(--tx2); font:inherit; font-size:12.5px; border-radius:var(--rad-sm); cursor:pointer; transition:.15s}
.cuotas-toggle:hover{border-color:var(--accent); color:var(--accent)}
.cuotas-toggle .cc{background:var(--accent); color:#fff; border-radius:10px; padding:.05rem .4rem; font-size:11px; font-weight:700; margin-left:.3rem}
/* Colapsar secciones: chevron a la IZQUIERDA (igual que las categorías), luego el número y
   "NOMBRE · 20%" juntos. Antes el chevron y el % estaban a la derecha — ahora todo a la izquierda. */
.sec-h.tappable{cursor:pointer; display:flex; align-items:center; justify-content:flex-start; gap:.5rem; user-select:none; border-radius:8px; margin:-.2rem -.4rem .2rem; padding:.2rem .4rem; transition:background .15s}
.sec-h.tappable:hover{background:var(--line2)}
.sec-h .secpct{color:var(--tx3); font-weight:500}
.sec-r{display:flex; align-items:center; gap:.6rem}
.chev{color:var(--tx3); font-size:13px; line-height:1; transition:color .15s}
.sec-h.tappable .chev{width:14px; text-align:center; flex:none}
.sec-h.tappable:hover .chev{color:var(--accent)}
/* Tab bar inferior */
.tabbar{position:fixed; left:0; right:0; bottom:0; z-index:50; display:flex; background:var(--card); border-top:1px solid var(--line); box-shadow:0 -2px 12px rgba(0,0,0,.05)}
.tabbtn{flex:1; border:none; background:transparent; cursor:pointer; padding:.5rem .2rem .6rem; display:flex; flex-direction:column; align-items:center; gap:.15rem; font:inherit; font-size:11px; color:var(--tx3); transition:.15s}
.tabbtn .ti{font-size:18px; line-height:1; filter:grayscale(1); opacity:.55; transition:.15s}
.tabbtn.active{color:var(--accent)}
.tabbtn.active .ti{filter:none; opacity:1}
.tabbtn:hover{color:var(--tx)}
/* Ingreso hero (lo primero y más grande del home) */
.hero-inc{text-align:center; padding:.4rem 0 1.1rem}
.hi-num{font-size:42px; font-weight:800; letter-spacing:-.03em; line-height:1; color:var(--tx); font-variant-numeric:tabular-nums}
.hi-sub{font-size:12.5px; color:var(--tx2); margin-top:.45rem}
.hi-sub b{color:var(--accent); font-weight:600}
.hi-phrase{font-size:11.5px; color:var(--tx3); margin-top:.3rem; font-style:italic}
.hi-edit{margin-top:.7rem; border:1px solid var(--line); background:transparent; color:var(--tx2); font:inherit; font-size:12px; padding:.3rem .8rem; border-radius:20px; cursor:pointer; transition:.15s}
.hi-edit:hover{border-color:var(--accent); color:var(--accent)}
.grid.sm .val{font-size:17px}
.grid.sm .lbl{font-size:10.5px}
.sec.is-collapsed{padding-bottom:.8rem}
.ov-bar{display:flex; justify-content:flex-end; margin:.4rem 0 -.2rem}
.ov-bar button{border:none; background:transparent; color:var(--tx3); font:inherit; font-size:12px; cursor:pointer; padding:.3rem .2rem}
.ov-bar button:hover{color:var(--accent)}
body.focuson .ov-bar{display:none}
/* Informe */
#sec-informe .sec-h .t{font-size:15px}
.inf-h{font-size:11px; text-transform:uppercase; letter-spacing:.04em; color:var(--tx3); margin-bottom:.7rem}
.inf-row{display:flex; align-items:center; gap:.6rem; margin-bottom:.55rem; font-size:12.5px}
.inf-l{flex:0 0 42%; color:var(--tx2)}
.inf-track{flex:1; height:8px; background:var(--line2); border-radius:5px; overflow:hidden}
.inf-fill{display:block; height:100%; border-radius:5px}
.inf-fill.c-nec{background:#4a7cf7}.inf-fill.c-luj{background:#9b6cf7}.inf-fill.c-aho{background:var(--ok)}.inf-fill.c-deu{background:#e0922f}
.inf-v{flex:0 0 auto; font-variant-numeric:tabular-nums; font-weight:600; white-space:nowrap}
.inf-v i{color:var(--tx3); font-style:normal; font-weight:400; font-size:11px}
.inf-tot{font-size:12.5px; color:var(--tx2); margin-top:.5rem; padding-top:.6rem; border-top:1px solid var(--line2)}
.inf-deu{font-size:13px; color:var(--tx2); line-height:1.7}
.inf-deu div{display:flex; justify-content:space-between}
.inf-deu span{font-weight:700; color:var(--tx); font-variant-numeric:tabular-nums}
.inf-verdict{margin-top:.8rem; padding:.85rem 1rem; border-radius:var(--rad-sm); font-size:13px; line-height:1.5}
.inf-verdict.ok{background:var(--ok-bg); color:var(--ok)}
.inf-verdict.bad{background:var(--bad-bg); color:var(--bad)}
.inf-verdict.neutral{background:var(--line2); color:var(--tx2)}
.row input.a[readonly]{color:var(--tx2); border-bottom-color:transparent; cursor:default}
.row .rm{width:28px; height:28px; flex:none; display:flex; align-items:center; justify-content:center;
  border:none; background:transparent; color:var(--tx3); cursor:pointer; border-radius:50%; font-size:17px; line-height:1; transition:.15s}
.row .rm:hover{background:var(--bad-bg); color:var(--bad)}
.row .tjt{width:26px; height:26px; flex:none; display:flex; align-items:center; justify-content:center; border:none; background:transparent; cursor:pointer; border-radius:50%; font-size:13px; opacity:.3; transition:.15s; filter:grayscale(1)}
.row .tjt:hover{opacity:.7; background:var(--line2)}
.row .tjt.on{opacity:1; background:var(--accent); color:#fff; filter:none}
.row.tjon input.a{color:var(--accent); font-weight:600}
.tjpicker{margin:.1rem 0 .6rem; padding:.65rem .75rem; background:var(--line2); border-radius:var(--rad-sm); display:flex; flex-direction:column; gap:.32rem}
.tjpicker-h{font-size:11.5px; color:var(--tx2); margin-bottom:.25rem; line-height:1.4}
.tjpick{font:inherit; font-size:13px; text-align:left; border:none; background:var(--card); color:var(--tx); border-radius:9px; padding:.5rem .65rem; cursor:pointer; transition:.15s; display:flex; justify-content:space-between; align-items:center; gap:.5rem}
.tjpick:hover{background:var(--accent); color:#fff}
.tjpick.sel{outline:2px solid var(--accent)}
.tjpick .rec{font-size:10.5px; color:var(--ok); font-weight:700; margin-left:.4rem}
.tjpick:hover .rec{color:#fff}
.tjpick.none{color:var(--tx2); font-size:12px; background:transparent; border:1px dashed var(--line); justify-content:center}
.tjnm{flex:none}
.tjright{display:flex; gap:.45rem; align-items:center; flex-wrap:wrap; justify-content:flex-end}
.tjav{font-size:11px; color:var(--tx2); white-space:nowrap}
.tjav.warn{color:var(--accent)}
.tjav.bad{color:var(--bad); font-weight:700}
.tjpick:hover .tjav{color:#fff}
.tjcuotas{font-size:12px; color:var(--tx2); padding:.5rem .2rem .1rem; line-height:1.5}
.tjcuotas input{width:46px; font:inherit; text-align:center; border:none; border-bottom:1px solid var(--line); background:transparent; color:var(--tx); padding:.1rem}

/* subcategorías */
.subwrap{margin-left:.9rem; padding-left:.95rem; border-left:1.5px solid var(--line2)}
/* Chevron para plegar/desplegar las subcategorías de una categoría (o Préstamo/Tarjeta dentro de Deuda) */
.subtoggle{flex:none; width:20px; height:28px; border:none; background:transparent; color:var(--tx3); cursor:pointer; font-size:12px; line-height:1; padding:0; margin-right:-.2rem}
.subtoggle:hover{color:var(--accent)}
/* "Deuda" como fila cohesionada con las categorías: mismas columnas que una .row */
.dg-fold{user-select:none}
.dg-fold .dd-name{flex:1; min-width:0; font-size:15px; font-weight:600; color:var(--tx); cursor:pointer; padding:.55rem .2rem}
.dg-fold .dg-total{width:78px; flex:none; text-align:right; font-size:15px; font-weight:700; color:var(--tx); font-variant-numeric:tabular-nums; padding:.55rem .2rem}
.dg-fold .pchk-sp{width:22px; flex:none}
/* Encabezado de grupo Préstamo / Tarjeta: nombre + subtotal + check-todos, alineado con las filas */
.kind-row .kh-name{flex:1; min-width:0; margin:0}
.kind-row .kh-total{width:78px; flex:none; text-align:right; font-size:13px; font-weight:700; color:var(--tx2); font-variant-numeric:tabular-nums; padding:.35rem .2rem}
.row.sub input.l,.row.sub input.a{font-size:13.5px; color:var(--tx2); padding-top:.45rem; padding-bottom:.45rem}
.row.sub input.a{font-weight:500}
.row.sub input:focus{color:var(--tx)}
.sub-add{font-size:12px; color:var(--tx3); margin-top:.15rem; margin-bottom:.35rem}

.add{margin-top:.5rem; font:inherit; font-size:13px; font-weight:500; color:var(--accent);
  background:transparent; border:none; cursor:pointer; padding:.4rem .1rem; display:inline-flex; align-items:center; gap:.3rem; transition:opacity .15s}
.add:hover{opacity:.65}
.add .p{font-size:16px; font-weight:400}

.tot{display:flex; align-items:center; justify-content:space-between;
  background:var(--card); border-radius:var(--rad); box-shadow:var(--shadow);
  padding:1.1rem 1.3rem; margin-top:1.1rem}
.tot .lbl{font-size:13px; color:var(--tx2); font-weight:500}
.tot .val{font-size:26px; font-weight:600; letter-spacing:-.02em; font-variant-numeric:tabular-nums}

.grid{display:grid; grid-template-columns:repeat(3,1fr); gap:.7rem; margin-top:.9rem}
.bcard{background:var(--card); border-radius:var(--rad-sm); box-shadow:var(--shadow); padding:.95rem 1rem}
.bcard .lbl{font-size:12px; color:var(--tx2); font-weight:500; margin-bottom:.3rem}
.bcard .val{font-size:19px; font-weight:600; letter-spacing:-.01em; font-variant-numeric:tabular-nums}
@media(max-width:480px){.grid{grid-template-columns:1fr}}

.reset{margin-top:2rem; font:inherit; font-size:13px; color:var(--tx3); background:transparent;
  border:none; cursor:pointer; transition:color .15s}
.reset:hover{color:var(--bad)}

/* Módulo Deudas y tarjetas */
.debts{margin-top:2.75rem; border-top:1px solid var(--line); padding-top:1.6rem}
.debts h2{font-size:19px; font-weight:600; letter-spacing:-.015em; margin-bottom:.2rem}
.dnote{font-size:12.5px; color:var(--tx2); margin-bottom:1.1rem}
.dhead{display:grid; grid-template-columns:1fr 72px 72px 68px 112px 24px; gap:.4rem; font-size:10.5px; text-transform:uppercase; letter-spacing:.04em; color:var(--tx3); margin-bottom:.35rem; padding:0 .15rem}
.dhead .r{text-align:right}
.drow{display:grid; grid-template-columns:1fr 72px 72px 68px 112px 24px; gap:.4rem; align-items:center}
.drow input{width:100%; min-width:0; box-sizing:border-box; font:inherit; font-size:13px; color:var(--tx); background:transparent; border:none; border-bottom:1px solid var(--line2); padding:.45rem .15rem}
.drow input.num{text-align:right; font-variant-numeric:tabular-nums; font-weight:600}
.drow input:focus{outline:none; border-bottom-color:var(--accent)}
.drow .rm{width:26px; height:26px; display:flex; align-items:center; justify-content:center; border:none; background:transparent; color:var(--tx3); cursor:pointer; border-radius:50%; font-size:16px; line-height:1; transition:.15s}
.drow .rm:hover{background:var(--bad-bg); color:var(--bad)}
.autohd{font-size:10.5px; text-transform:uppercase; letter-spacing:.04em; color:var(--tx3); margin:1rem 0 .4rem}
.arow{display:grid; grid-template-columns:1fr auto auto; gap:.6rem; align-items:center; padding:.4rem .15rem; border-bottom:1px dashed var(--line2); font-size:12.5px}
.arow .anm{color:var(--tx2)}
.arow .aamt{color:var(--accent); font-weight:600; font-variant-numeric:tabular-nums; white-space:nowrap}
.arow .adue{color:var(--tx3); font-size:11px; white-space:nowrap; min-width:54px; text-align:right}
.plan{background:var(--card); border-radius:var(--rad); box-shadow:var(--shadow); padding:1.2rem 1.3rem; margin-top:1.4rem}
.plan.hero{margin-top:1.5rem; border:1px solid var(--line); box-shadow:0 4px 16px rgba(0,0,0,.06),0 1px 3px rgba(0,0,0,.04)}
.plan-h{font-size:12.5px; font-weight:600; text-transform:uppercase; letter-spacing:.03em; color:var(--tx2)}
.plan-ctx{font-size:12.5px; color:var(--tx2); margin:.5rem 0 1rem}
.plan-ctx b,.plan-sum b{font-variant-numeric:tabular-nums; color:var(--tx)}
.pl{display:flex; align-items:center; gap:.55rem; padding:.55rem 0; border-bottom:1px solid var(--line2)}
.pl .pnum{width:20px; height:20px; border-radius:50%; background:var(--accent); color:#fff; font-size:11px; font-weight:700; display:inline-flex; align-items:center; justify-content:center; flex:none; font-variant-numeric:tabular-nums}
.pl .nm{flex:1; font-size:13.5px}
.pl .due{font-size:11px; color:var(--tx3)}
.pl .amt{font-size:12.5px; color:var(--tx2); font-variant-numeric:tabular-nums; white-space:nowrap}
.plan-sum{margin-top:1rem; font-size:13px; color:var(--tx2); line-height:1.5}
.pl .why{display:block; font-size:11px; color:var(--tx3); margin-top:.1rem}
.pcheck{width:22px; height:22px; flex:none; border:2px solid var(--line); background:transparent; border-radius:6px; cursor:pointer; color:#fff; font-size:13px; font-weight:800; line-height:1; display:flex; align-items:center; justify-content:center; transition:.15s; padding:0}
.pcheck:hover{border-color:var(--accent)}
.pcheck.on{background:var(--ok); border-color:var(--ok)}
.pl.is-paid{opacity:.5}
.row.sub.is-paid{opacity:.55}
.paidbar{display:flex; gap:.8rem; font-size:12.5px; color:var(--tx2); margin:.2rem 0 .8rem; padding:.5rem .7rem; background:var(--line2); border-radius:var(--rad-sm)}
.paidbar b{color:var(--tx); font-variant-numeric:tabular-nums}
.wf-box{background:var(--line2); border-radius:var(--rad-sm); padding:.7rem .85rem; margin:.4rem 0 1rem}
.wf-h{font-size:11px; text-transform:uppercase; letter-spacing:.04em; color:var(--tx3); margin-bottom:.5rem}
.wf{display:flex; justify-content:space-between; font-size:12.5px; color:var(--tx2); padding:.18rem 0; font-variant-numeric:tabular-nums}
.wf.tot{font-weight:700; color:var(--tx); border-top:1px solid var(--line); margin-top:.15rem; padding-top:.35rem}
.wf-note{font-size:11.5px; color:var(--accent); line-height:1.4; margin:.3rem 0 .15rem}
.tag.part{color:#e0922f; background:rgba(224,146,47,.12)}
.crisis{background:var(--bad-bg); color:var(--bad); padding:.85rem 1rem; border-radius:var(--rad-sm); font-size:12.5px; font-weight:500; margin-bottom:1rem; line-height:1.45}
.calm{background:var(--ok-bg); color:var(--ok); padding:.9rem 1.05rem; border-radius:var(--rad-sm); font-size:13px; font-weight:500; margin-bottom:1rem; line-height:1.5}
.warn{background:rgba(224,146,47,.12); color:#e0922f; padding:.9rem 1.05rem; border-radius:var(--rad-sm); font-size:13px; font-weight:500; margin-bottom:1rem; line-height:1.5}
.tjgrid{display:grid; grid-template-columns:1fr 78px 120px; gap:.7rem}
.tjgrid label{font-size:11px; color:var(--tx3); display:flex; flex-direction:column; gap:.25rem}
.tjgrid input{font:inherit; font-size:14px; color:var(--tx); background:transparent; border:none; border-bottom:1px solid var(--line2); padding:.4rem .15rem; font-weight:600; text-align:right}
.tjgrid input:focus{outline:none; border-bottom-color:var(--accent)}
/* Corazón — "Libre para gastar" por sección (lo primero que ves al abrir) */
.heart{background:var(--card); border:1px solid var(--line); border-radius:var(--rad); box-shadow:var(--shadow); padding:1.1rem 1.1rem 1.2rem; margin:.4rem 0 1.6rem}
.heart-h{font-size:11.5px; font-weight:600; text-transform:uppercase; letter-spacing:.03em; color:var(--tx2); text-align:center; margin-bottom:.45rem}
.heart-note{font-size:11px; color:var(--tx3); line-height:1.45; text-align:center; margin:0 0 1rem}
html,body{overflow-x:hidden}
.heart-rows{display:flex; flex-direction:column}
.hrow{padding:.6rem 0; border-bottom:1px solid var(--line)}
.hrow:first-child{padding-top:0}
.hrow:last-child{border-bottom:none}
.hr-top{display:flex; justify-content:space-between; align-items:baseline; gap:.6rem}
.hr-lbl{font-size:13px; color:var(--tx2); font-weight:600; flex-shrink:0}
.hr-amt{font-size:14px; color:var(--tx2); text-align:right; min-width:0}
.hr-amt b{color:var(--tx); font-weight:700; font-variant-numeric:tabular-nums}
.hr-over{font-size:12px; color:var(--bad); font-weight:600; margin-top:.2rem; text-align:right}
.heart-total{display:flex; justify-content:space-between; align-items:baseline; gap:.6rem; margin-top:.85rem; padding-top:.7rem; border-top:1.5px solid var(--line2); font-size:13px; color:var(--tx2); font-weight:600}
.heart-total b{color:var(--tx); font-weight:800; font-variant-numeric:tabular-nums}
.heart-exec{margin-top:.7rem; padding-top:.6rem; border-top:1px dashed var(--line); font-size:12px; color:var(--tx2); text-align:center; line-height:1.45}
.heart-exec b{color:var(--tx); font-variant-numeric:tabular-nums}
.heart-exec .he-ck{color:var(--ok); margin-right:.1rem}
body.focuson #heart{display:none}
/* Bienvenida — primer arranque: elegir ciclo antes de ver nada */
.welcome{position:fixed; inset:0; z-index:100; background:var(--bg); display:flex; align-items:center; justify-content:center; padding:1.5rem}
.welcome[hidden]{display:none}
.wel-card{width:100%; max-width:420px; text-align:center}
.wel-logo{font-size:30px; font-weight:700; letter-spacing:-.02em; margin-bottom:2rem}
.wel-h{font-size:23px; font-weight:600; letter-spacing:-.02em; margin-bottom:.5rem}
.wel-sub{font-size:14px; color:var(--tx2); margin-bottom:1.8rem}
.wel-opt{display:flex; flex-direction:column; gap:.2rem; width:100%; text-align:left; border:1.5px solid var(--line); background:var(--card); border-radius:var(--rad); padding:1rem 1.2rem; margin-bottom:.8rem; cursor:pointer; transition:.15s; font:inherit}
.wel-opt:hover{border-color:var(--accent); transform:translateY(-1px)}
.wo-t{font-size:16px; font-weight:600; color:var(--tx)}
.wo-s{font-size:12.5px; color:var(--tx2)}
.wel-foot{font-size:12px; color:var(--tx3); line-height:1.5; margin-top:1.4rem}
.wel-foot b{color:var(--tx2)}
body.welcoming .tabbar,body.welcoming .head{display:none}
/* Deuda dentro de Ahorro: Préstamo + Tarjeta de crédito + formulario de tarjeta */
.dgroup{margin-top:.5rem}
.dg-t{font-size:14px; font-weight:600; color:var(--tx); padding:.5rem 0 .15rem}
.dsub-t{font-size:11px; text-transform:uppercase; letter-spacing:.04em; color:var(--tx3); margin:.25rem 0 .15rem}
.dcard{flex:1; min-width:0; display:flex; justify-content:space-between; align-items:center; gap:.5rem; font:inherit; text-align:left; border:none; background:transparent; color:var(--tx); cursor:pointer; padding:.5rem .15rem; border-bottom:1px solid var(--line2)}
.dcard:hover .dc-n{color:var(--accent)}
.dc-n{font-size:13.5px}
.dc-d{font-size:11.5px; color:var(--tx3); white-space:nowrap}
.cardform{background:var(--line2); border-radius:var(--rad-sm); padding:.9rem .9rem 1rem; margin:.5rem 0 .7rem}
.cf-h{font-size:12px; font-weight:700; color:var(--tx2); text-transform:uppercase; letter-spacing:.03em; margin-bottom:.7rem}
.cf-l{display:flex; flex-direction:column; gap:.25rem; font-size:11.5px; color:var(--tx2); margin-bottom:.6rem}
.cf-i{font:inherit; font-size:14px; color:var(--tx); background:var(--card); border:1px solid var(--line); border-radius:9px; padding:.55rem .65rem}
.cf-i:focus{outline:none; border-color:var(--accent)}
.cf-btns{display:flex; gap:.5rem; margin-top:.5rem}
.cf-save{flex:1; border:none; background:var(--accent); color:#fff; font:inherit; font-weight:600; font-size:13px; border-radius:9px; padding:.65rem; cursor:pointer}
.cf-save:hover{filter:brightness(1.08)}
.cf-cancel{border:1px solid var(--line); background:transparent; color:var(--tx2); font:inherit; font-size:13px; border-radius:9px; padding:.65rem 1rem; cursor:pointer}
/* Selección de qué deuda pagar este ciclo + modo (Mín/Mes/Total) */
.dmodes{display:flex; gap:.35rem; padding:.1rem 0 .55rem 1.9rem; flex-wrap:wrap}
.dmode{font:inherit; font-size:11px; border:1px solid var(--line); background:transparent; color:var(--tx2); border-radius:14px; padding:.3rem .55rem; cursor:pointer; transition:.15s; font-variant-numeric:tabular-nums}
.dmode:hover{border-color:var(--accent); color:var(--accent)}
.dmode.on{background:var(--accent); border-color:var(--accent); color:#fff}
.drec{font-size:11px}
.dtotal{font-size:12.5px; color:var(--tx2); margin-top:.7rem; padding-top:.55rem; border-top:1px solid var(--line2)}
.dtotal b{color:var(--tx); font-variant-numeric:tabular-nums}
.pchk-plan.on{background:var(--accent); border-color:var(--accent)}
.row.is-paid input.l{opacity:.6}
.dlegend{font-size:11px; color:var(--tx3); line-height:1.45; margin:.15rem 0 .5rem}
.dlegend b{color:var(--tx2)}
/* Copia de seguridad (exportar / importar datos) */
.backup{display:flex; gap:.6rem; justify-content:center; margin-top:1.6rem; flex-wrap:wrap}
.bk-btn{font:inherit; font-size:12px; color:var(--tx2); background:transparent; border:1px solid var(--line); border-radius:20px; padding:.45rem .9rem; cursor:pointer; transition:.15s}
.bk-btn:hover{border-color:var(--accent); color:var(--accent)}
/* Banco / selector de deudas a pagar esta quincena */
.debtpicker{background:var(--line2); border-radius:var(--rad-sm); padding:.8rem; margin:.3rem 0 .7rem}
.pk-h{font-size:12px; color:var(--tx2); margin-bottom:.7rem; line-height:1.4}
.pkrow{background:var(--card); border-radius:9px; padding:.6rem .7rem; margin-bottom:.5rem}
.pk-top{display:flex; justify-content:space-between; align-items:center; gap:.5rem}
.pk-n{font-size:13.5px; font-weight:600; color:var(--tx)}
.pk-act{display:flex; gap:.15rem; flex:none}
.pk-edit,.pk-del{border:none; background:transparent; color:var(--tx3); cursor:pointer; font-size:14px; padding:.2rem .35rem; border-radius:6px; line-height:1}
.pk-edit:hover,.pk-del:hover{background:var(--line2); color:var(--accent)}
.pk-info{font-size:11.5px; color:var(--tx3); margin:.15rem 0 .5rem}
.pk-modes{display:flex; gap:.4rem; flex-wrap:wrap}
.pk-m{font:inherit; font-size:11.5px; border:1px solid var(--line); background:transparent; color:var(--tx2); border-radius:14px; padding:.35rem .6rem; cursor:pointer; transition:.15s; font-variant-numeric:tabular-nums}
.pk-m:hover{background:var(--accent); border-color:var(--accent); color:#fff}
.pk-empty{font-size:12.5px; color:var(--tx3); text-align:center; padding:.5rem}
.pk-new{display:block; width:100%; margin:.3rem 0; font:inherit; font-size:12.5px; color:var(--accent); background:transparent; border:1px dashed var(--line); border-radius:9px; padding:.55rem; cursor:pointer}
.pk-new:hover{border-color:var(--accent)}
.pk-done{display:block; width:100%; margin-top:.4rem; font:inherit; font-size:13px; font-weight:600; color:#fff; background:var(--accent); border:none; border-radius:9px; padding:.55rem; cursor:pointer}
.dd-ic{display:inline-flex; align-items:center; color:var(--accent); margin-right:.15rem}
.dd-n{flex:1; font-size:13.5px}
/* Plantillas */
.tpl{margin-top:1.6rem; text-align:center}
.tpl-h{font-size:12px; font-weight:600; text-transform:uppercase; letter-spacing:.03em; color:var(--tx2); margin-bottom:.7rem}
.tpl-list{display:flex; flex-wrap:wrap; gap:.5rem; justify-content:center; margin-bottom:.8rem}
.tpl-item{display:inline-flex; align-items:center; border:1px solid var(--line); border-radius:20px; overflow:hidden}
.tpl-load{font:inherit; font-size:12.5px; color:var(--tx); background:transparent; border:none; padding:.45rem .35rem .45rem .9rem; cursor:pointer}
.tpl-load:hover{color:var(--accent)}
.tpl-del{font:inherit; font-size:15px; color:var(--tx3); background:transparent; border:none; padding:.3rem .6rem .3rem .2rem; cursor:pointer; line-height:1}
.tpl-del:hover{color:var(--bad)}
.tpl-empty{font-size:12px; color:var(--tx3); line-height:1.45; margin:0 auto .8rem; max-width:340px}
/* Salud de tarjetas */
.salud{background:var(--card); border:1px solid var(--line); border-radius:var(--rad); box-shadow:var(--shadow); padding:1rem 1.1rem; margin:.4rem 0 1.4rem}
.sa-h{font-size:12px; font-weight:600; color:var(--tx2); margin-bottom:.8rem; line-height:1.4}
.sa-row{display:flex; align-items:center; gap:.6rem; margin-bottom:.5rem}
.sa-n{flex:0 0 32%; font-size:12.5px; color:var(--tx); overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
.sa-bar{flex:1; height:8px; background:var(--line2); border-radius:5px; overflow:hidden}
.sa-fill{display:block; height:100%; border-radius:5px; background:var(--tx3)}
.sa-fill.sa-green{background:var(--ok)} .sa-fill.sa-amber{background:#e0922f} .sa-fill.sa-red{background:var(--bad)}
.sa-pct{flex:0 0 auto; font-size:11.5px; font-weight:600; font-variant-numeric:tabular-nums; color:var(--tx2); min-width:56px; text-align:right}
.sa-pct.sa-green{color:var(--ok)} .sa-pct.sa-amber{color:#e0922f} .sa-pct.sa-red{color:var(--bad)}
.sa-verdict{font-size:12.5px; line-height:1.5; margin-top:.8rem; padding-top:.7rem; border-top:1px solid var(--line2); color:var(--tx)}
.sa-prio{font-size:12.5px; line-height:1.5; margin-top:.6rem; color:var(--tx2)}
.sa-prio b{color:var(--tx)}
.tjpick:disabled,.tjpick.tjp-block{opacity:.45; cursor:not-allowed}
.dd-d{font-size:11px; color:var(--tx3); white-space:nowrap; margin-right:.2rem}
/* Fondo / Reserva + cerrar quincena */
.fondo-box{margin-top:1rem; background:var(--line2); border-radius:var(--rad-sm); padding:.9rem 1rem}
.fondo-row{display:flex; justify-content:space-between; align-items:center; gap:.6rem}
.fondo-lbl{font-size:13px; color:var(--tx)}
.fondo-hint{font-size:11px; color:var(--tx3); display:block}
.fondo-val{font-size:14px; color:var(--tx2); white-space:nowrap}
.fondo-val input{width:92px; font:inherit; font-size:15px; font-weight:600; text-align:right; color:var(--tx); background:var(--card); border:1px solid var(--line); border-radius:8px; padding:.35rem .5rem}
.fondo-val input:focus{outline:none; border-color:var(--accent)}
.fondo-note{font-size:12px; color:var(--tx2); line-height:1.5; margin-top:.6rem}
.fondo-note b{color:var(--tx); font-variant-numeric:tabular-nums}
.fondo-close{display:block; width:100%; margin-top:.85rem; font:inherit; font-size:13px; font-weight:600; color:#fff; background:var(--accent); border:none; border-radius:9px; padding:.6rem; cursor:pointer}
.fondo-close:hover{filter:brightness(1.08)}
/* Reserva: escalera de pisos (Colchón → Metas → Inversiones) + estado de cuenta del ciclo */
.ft-piso{display:flex; align-items:center; gap:.45rem; font-size:13px; font-weight:700; color:var(--tx); margin:1.1rem 0 .4rem}
.ft-piso .ft-hint{font-weight:400; display:inline; margin-left:.15rem}
.ftp-n{width:18px; height:18px; border-radius:50%; background:var(--accent); color:#fff; font-size:10.5px; font-weight:700; display:inline-flex; align-items:center; justify-content:center; flex:none}
.ftc-bar{height:8px; background:var(--line2); border-radius:99px; overflow:hidden}
.ftc-fill{height:100%; background:var(--ok); border-radius:99px; transition:width .25s}
.ftc-l{font-size:11.5px; color:var(--tx2); margin-top:.3rem}
.ftc-l .neg,.ftm-r .neg{color:var(--bad)}
.ft-mov{background:var(--line2); border-radius:var(--rad-sm); padding:.55rem .7rem; margin:.7rem 0 0}
.ftm-h{font-size:11.5px; font-weight:700; color:var(--tx2); margin-bottom:.25rem}
.ftm-r{display:flex; justify-content:space-between; gap:.6rem; font-size:12px; color:var(--tx2); padding:.14rem 0}
.ftm-r b{font-variant-numeric:tabular-nums; white-space:nowrap}
.ftm-r b.ok{color:var(--ok)}
/* Ceremonia de cierre: modal de liquidación por caja (reemplaza los confirm() encadenados) */
.cierre-ovl{position:fixed; inset:0; z-index:90; background:rgba(0,0,0,.45); display:flex; align-items:flex-end; justify-content:center}
.cierre-card{background:var(--card); border-radius:18px 18px 0 0; box-shadow:var(--shadow); width:100%; max-width:560px; max-height:88vh; overflow-y:auto; padding:1.1rem 1.15rem 1.3rem}
@media(min-width:600px){.cierre-ovl{align-items:center; padding:1rem}.cierre-card{border-radius:18px}}
.ci-h{font-size:16px; font-weight:800; color:var(--tx); margin-bottom:.15rem}
.ci-sub{font-size:12px; color:var(--tx3); margin-bottom:.7rem}
.ci-nums{display:flex; gap:.5rem; margin:.6rem 0}
.ci-num{flex:1; background:var(--line2); border-radius:var(--rad-sm); padding:.55rem .5rem; text-align:center}
.ci-num i{display:block; font-style:normal; font-size:10px; color:var(--tx3); text-transform:uppercase; letter-spacing:.03em}
.ci-num b{font-size:15px; color:var(--tx); font-variant-numeric:tabular-nums}
.ci-sec{margin-top:1rem}
.ci-sec-h{font-size:11.5px; font-weight:700; color:var(--tx2); text-transform:uppercase; letter-spacing:.04em; margin-bottom:.35rem}
.ci-row{display:flex; align-items:center; gap:.5rem; padding:.42rem 0; border-bottom:1px solid var(--line2); font-size:13px; color:var(--tx)}
.ci-row .cr-a{margin-left:auto; font-weight:700; font-variant-numeric:tabular-nums; white-space:nowrap}
.ci-tog{font:inherit; font-size:11px; font-weight:700; border:1.5px solid var(--line); background:transparent; color:var(--tx3); border-radius:999px; padding:.3rem .55rem; cursor:pointer; white-space:nowrap}
.ci-tog.on{border-color:var(--accent); background:var(--accent); color:#fff}
.ci-q{margin-top:.6rem; font-size:13.5px; font-weight:600; color:var(--tx); line-height:1.45}
.ci-opts{display:flex; gap:.5rem; margin-top:.55rem; flex-wrap:wrap}
.ci-opt{flex:1; min-width:150px; font:inherit; font-size:12.5px; font-weight:600; border:1.5px solid var(--line); background:transparent; color:var(--tx); border-radius:10px; padding:.6rem .5rem; cursor:pointer; text-align:center; line-height:1.35}
.ci-opt.on{border-color:var(--accent); background:var(--accent); color:#fff}
.ci-note{font-size:11.5px; color:var(--tx3); margin-top:.4rem; line-height:1.5}
.ci-abs{font-size:12.5px; color:var(--tx2); margin-top:.4rem; line-height:1.5}
.ci-warn{background:var(--line2); border-left:3px solid var(--bad); padding:.5rem .7rem; border-radius:8px; font-size:12px; color:var(--tx2); margin-top:.6rem; line-height:1.5}
.ci-btns{display:flex; gap:.6rem; margin-top:1.1rem}
.ci-cancel{flex:0 0 auto; font:inherit; font-size:13px; color:var(--tx2); background:transparent; border:1.5px solid var(--line); border-radius:10px; padding:.65rem .9rem; cursor:pointer}
.ci-go{flex:1; font:inherit; font-size:13.5px; font-weight:700; color:#fff; background:var(--accent); border:none; border-radius:10px; padding:.65rem; cursor:pointer}
.ci-go:disabled{opacity:.45; cursor:not-allowed}
.dd-carried{font-size:10px; color:var(--accent); background:var(--line2); border-radius:6px; padding:.1rem .35rem; margin-left:.3rem; white-space:nowrap}
/* Banners de frontera de ciclo (cierre pendiente / ciclo cerrado) */
.close-banner{display:flex; align-items:center; gap:.55rem; flex-wrap:wrap; background:var(--line2); border:1.5px solid var(--accent); border-radius:var(--rad-sm); padding:.7rem .85rem; margin:.6rem 0 .2rem; font-size:12.5px; color:var(--tx); line-height:1.4}
.close-banner .cb-btn{margin-left:auto; font:inherit; font-size:12.5px; font-weight:700; color:#fff; background:var(--accent); border:none; border-radius:8px; padding:.45rem .7rem; cursor:pointer; white-space:nowrap}
.closed-banner{background:var(--line2); border-left:3px solid var(--ok); border-radius:var(--rad-sm); padding:.55rem .85rem; margin:.6rem 0 .2rem; font-size:12.5px; color:var(--tx2)}
.closed-banner b{color:var(--tx)}
.hero-fondo{text-align:center; font-size:12.5px; color:var(--tx2); margin:.2rem 0 .5rem}
.hero-fondo input{width:88px; font:inherit; font-size:14px; font-weight:600; text-align:right; color:var(--tx); background:transparent; border:none; border-bottom:1px dashed var(--line); padding:1px 3px}
.hero-fondo input:focus{outline:none; border-bottom-color:var(--accent)}
.hf-hint{color:var(--tx3); font-size:11px}
.wel-fondo{margin:.5rem 0 1rem; font-size:18px; color:var(--tx2); text-align:center}
.wel-fondo input{width:140px; font:inherit; font-size:20px; font-weight:700; text-align:center; color:var(--tx); background:var(--card); border:1.5px solid var(--line); border-radius:var(--rad-sm); padding:.5rem}
.wel-fondo input:focus{outline:none; border-color:var(--accent)}
/* Advisor */
.advisor{background:var(--card); border:1px solid var(--line); border-radius:var(--rad-sm); padding:1rem 1.1rem; margin-bottom:1rem}
.adv-h{font-size:15px; font-weight:700; color:var(--tx); margin-bottom:.7rem}
.adv-empty{font-size:13px; color:var(--tx3); line-height:1.5}
.adv-steps{margin:0 0 .9rem; padding-left:1.3rem; display:flex; flex-direction:column; gap:.5rem}
.adv-steps li{font-size:13px; color:var(--tx2); line-height:1.5}
.adv-steps b{color:var(--tx)}
.adv-comp{background:var(--line2); border-radius:var(--rad-sm); padding:.7rem .8rem; margin-bottom:.9rem}
.ac-h{font-size:11px; text-transform:uppercase; letter-spacing:.04em; color:var(--tx3); margin-bottom:.5rem}
.ac-row{display:grid; grid-template-columns:1.1fr 1fr 1.3fr; gap:.4rem; font-size:12.5px; padding:.3rem 0; align-items:center}
.ac-head{font-size:11px; color:var(--tx3); border-bottom:1px solid var(--line); padding-bottom:.35rem}
.ac-k{color:var(--tx2)}
.ac-you{color:var(--tx2)}
.ac-rec{color:var(--tx); font-weight:600}
.ac-diff .ac-rec{color:var(--accent)}
.adv-apply{display:block; width:100%; font:inherit; font-size:14px; font-weight:700; color:#fff; background:var(--accent); border:none; border-radius:10px; padding:.7rem; cursor:pointer}
.adv-apply:hover{filter:brightness(1.08)}
.adv-or{text-align:center; font-size:11.5px; color:var(--tx3); margin-top:.5rem}
/* Invertir */
.inv-body{padding:.2rem 0}
.inv-lock{background:var(--line2); border-radius:var(--rad-sm); padding:1rem}
.il-h{font-size:15px; font-weight:700; color:var(--tx); margin-bottom:.5rem}
.il-txt{font-size:13px; color:var(--tx2); line-height:1.55; margin-bottom:.8rem}
.il-txt b{color:var(--tx)}
.il-list{display:flex; flex-direction:column; gap:.4rem; margin-bottom:.8rem}
.il-row{display:flex; justify-content:space-between; align-items:center; gap:.5rem; background:var(--card); border-radius:8px; padding:.5rem .7rem; font-size:12.5px}
.il-row span:first-child{font-weight:600; color:var(--tx)}
.il-r{color:var(--bad); font-weight:600; white-space:nowrap}
.il-d{color:var(--tx3); font-size:11.5px; white-space:nowrap}
.il-foot{font-size:11.5px; color:var(--tx3); line-height:1.5}
.io-meta{font-size:14px; color:var(--tx2); margin-bottom:1rem}
.io-meta b{color:var(--tx); font-size:16px}
.io-sub{color:var(--tx3); font-size:12px}
.io-h{font-size:12px; text-transform:uppercase; letter-spacing:.04em; color:var(--tx3); margin-bottom:.5rem}
.io-steps{margin:0 0 1rem; padding-left:1.3rem; display:flex; flex-direction:column; gap:.7rem}
.io-steps li{font-size:13px; color:var(--tx2); line-height:1.55}
.io-steps b{color:var(--tx)}
.io-div{display:flex; flex-direction:column; gap:.5rem; margin:.6rem 0}
.iod{background:var(--line2); border-radius:8px; padding:.6rem .7rem}
.iod-t{display:block; font-weight:700; color:var(--tx); font-size:12.5px; margin-bottom:.2rem}
.iod-d{font-size:12px; color:var(--tx2); line-height:1.45}
.io-mix{font-size:12px; color:var(--tx3); font-style:italic}
.io-disc{font-size:11.5px; color:var(--tx3); line-height:1.5; border-top:1px solid var(--line); padding-top:.7rem}
/* Gestos táctiles: jalar para refrescar + swipe entre ciclos */
#ptr{position:fixed; top:-46px; left:50%; transform:translateX(-50%); width:38px; height:38px; border-radius:50%; background:var(--card); border:1px solid var(--line); box-shadow:var(--shadow); display:flex; align-items:center; justify-content:center; opacity:0; z-index:300; pointer-events:none; transition:opacity .15s}
#ptr .ptr-i{font-size:20px; color:var(--accent); line-height:1; transition:transform .2s}
#ptr.ready .ptr-i{transform:rotate(180deg)}
#ptr.go .ptr-i{animation:ptrspin .6s linear infinite}
@keyframes ptrspin{to{transform:rotate(360deg)}}
#cyc-toast{position:fixed; bottom:84px; left:50%; transform:translateX(-50%) translateY(10px); background:var(--tx); color:var(--card); font-size:13px; font-weight:700; padding:.5rem .95rem; border-radius:20px; opacity:0; z-index:300; pointer-events:none; transition:opacity .2s, transform .2s; box-shadow:var(--shadow)}
#cyc-toast.show{opacity:1; transform:translateX(-50%) translateY(0)}
/* Editor de deudas (tab Deudas) — todos los campos editables */
.drow2{background:var(--card); border:1px solid var(--line); border-radius:var(--rad-sm); padding:.7rem .8rem; margin-bottom:.6rem}
.dr-top{display:flex; gap:.5rem; align-items:center; margin-bottom:.6rem}
.dr-n{flex:1; font:inherit; font-size:14px; font-weight:600; color:var(--tx); background:transparent; border:none; border-bottom:1px solid var(--line); padding:.2rem 0}
.dr-n:focus{outline:none; border-bottom-color:var(--accent)}
.dr-grid{display:grid; grid-template-columns:1fr 1fr; gap:.5rem}
.df-l{display:flex; flex-direction:column; font-size:10.5px; color:var(--tx3); gap:.15rem}
.df-l input{font:inherit; font-size:13px; color:var(--tx); background:var(--line2); border:1px solid var(--line); border-radius:7px; padding:.4rem .45rem}
.df-l input:focus{outline:none; border-color:var(--accent)}
.dr-debe{font-size:11px; color:var(--tx2); margin-top:.55rem; padding-top:.45rem; border-top:1px dashed var(--line)}
.dr-debe b{color:var(--tx); font-variant-numeric:tabular-nums}
.dr-debe span{color:var(--tx3); font-size:10px}
/* Onboarding: selector de periodo (mes / quincena / personalizado) + fecha de hoy */
.wel-modes{display:flex; gap:.4rem; margin:.2rem 0 .8rem}
.wel-mode{flex:1; font:inherit; font-size:12px; padding:.5rem .3rem; border:1px solid var(--line); border-radius:9px; background:var(--card); color:var(--tx2); cursor:pointer}
.wel-mode.on{border-color:var(--accent); color:var(--accent); font-weight:600}
.wel-pl{display:flex; flex-direction:column; font-size:11px; color:var(--tx3); gap:.2rem; margin-bottom:.6rem; text-align:left}
.wel-pl input{font:inherit; font-size:15px; color:var(--tx); background:var(--card); border:1.5px solid var(--line); border-radius:var(--rad-sm); padding:.5rem}
.wel-pl input:focus{outline:none; border-color:var(--accent)}
.wel-half{display:flex; gap:.4rem}
.wel-half button{flex:1; font:inherit; font-size:12px; padding:.45rem; border:1px solid var(--line); border-radius:8px; background:var(--card); color:var(--tx2); cursor:pointer}
.wel-half button.on{border-color:var(--accent); color:var(--accent); font-weight:600}
.today{font-size:11px; color:var(--tx3); font-weight:500}
/* Barra de ciclos compacta: ‹ activo (fechas) › +Q +M */
#cyclebar{display:flex; align-items:center; gap:.3rem; flex-wrap:wrap}
.cyc-nav{font:inherit; font-size:16px; line-height:1; width:26px; height:26px; border:1px solid var(--line); border-radius:7px; background:var(--card); color:var(--tx2); cursor:pointer}
.cyc-nav:disabled{opacity:.3; cursor:default}
.cyc-cur{font-size:12.5px; font-weight:600; color:var(--tx); padding:0 .2rem}
.cyc-cur .qt-d{font-weight:400; color:var(--tx3); font-size:11px}
.cyc-add{font:inherit; font-size:11px; padding:.25rem .4rem; border:1px dashed var(--line); border-radius:7px; background:none; color:var(--tx3); cursor:pointer}
/* Pestaña Fondo (caja fuerte + metas) */
.ft-total{display:flex; justify-content:space-between; align-items:baseline; gap:.6rem; margin-bottom:1.1rem}
.ft-l{font-size:14px; color:var(--tx); font-weight:600}
.ft-hint{display:block; font-size:11px; color:var(--tx3); font-weight:400}
.ft-v{font-size:15px; color:var(--tx2); white-space:nowrap}
.ft-v input{width:104px; font:inherit; font-size:17px; font-weight:800; text-align:right; color:var(--tx); background:var(--card); border:1px solid var(--line); border-radius:8px; padding:.4rem .5rem}
.ft-v input:focus{outline:none; border-color:var(--accent)}
.ft-cats-h{font-size:11px; text-transform:uppercase; letter-spacing:.03em; color:var(--tx3); margin-bottom:.55rem}
.ft-cat{display:flex; gap:.4rem; align-items:center; margin-bottom:.45rem}
.ftc-n{flex:1; min-width:0; font:inherit; font-size:13.5px; color:var(--tx); background:var(--card); border:1px solid var(--line); border-radius:8px; padding:.45rem .5rem}
.ftc-a{font-size:13px; color:var(--tx2); white-space:nowrap}
.ftc-a input{width:82px; font:inherit; font-size:14px; font-weight:600; text-align:right; color:var(--tx); background:var(--card); border:1px solid var(--line); border-radius:8px; padding:.45rem .45rem}
.ftc-n:focus,.ftc-a input:focus{outline:none; border-color:var(--accent)}
.ftc-rm{border:none; background:none; color:var(--tx3); font-size:18px; cursor:pointer; padding:0 .15rem}
.ft-sin{margin-top:1rem; padding-top:.7rem; border-top:1px solid var(--line); font-size:13px; color:var(--tx2)}
.ft-sin b{color:var(--ok); font-variant-numeric:tabular-nums}
.ft-sin.neg b{color:var(--bad)}
/* ===== Pulido móvil (jul 2026): barra centrada · cajas con color · 4ª columna ✓ · tema manual ===== */
/* Dos filas para que el label quede REALMENTE centrado (no solo el grupo entero): fila 1 = navegación
   (flechas simétricas + label), fila 2 = +Q/+M/+P debajo, sin competir por el centro de la fila 1. */
#cyclebar{flex-direction:column; align-items:center; gap:.4rem}
.cyc-main{display:flex; align-items:center; justify-content:center; gap:.5rem}
.cyc-addrow{display:flex; gap:.4rem; justify-content:center}
.cyc-edit{font:inherit; font-size:12px; line-height:1; width:24px; height:24px; border:1px solid var(--line); border-radius:7px; background:var(--card); color:var(--tx3); cursor:pointer; transition:.15s; margin-left:.15rem}
.cyc-edit:hover,.cyc-edit.on{border-color:var(--accent); color:var(--accent)}
.cyc-editor{width:100%; max-width:340px; margin:.2rem auto 0; background:var(--card); border:1px solid var(--line); border-radius:var(--rad-sm); box-shadow:var(--shadow); padding:.8rem .9rem}
.ce-modes{display:flex; gap:.4rem; margin-bottom:.7rem}
.ce-mode{flex:1; font:inherit; font-size:12px; padding:.45rem .3rem; border:1px solid var(--line); border-radius:8px; background:transparent; color:var(--tx2); cursor:pointer; transition:.15s}
.ce-mode.on{border-color:var(--accent); color:var(--accent); font-weight:600}
.ce-dates{display:flex; gap:.5rem; margin-bottom:.7rem}
.ce-l{flex:1; display:flex; flex-direction:column; gap:.2rem; font-size:11px; color:var(--tx3)}
.ce-l input{font:inherit; font-size:13px; color:var(--tx); background:var(--bg); border:1px solid var(--line); border-radius:8px; padding:.45rem .4rem}
.ce-l input:focus{outline:none; border-color:var(--accent)}
.ce-done{display:block; width:100%; font:inherit; font-size:13px; font-weight:600; color:#fff; background:var(--accent); border:none; border-radius:8px; padding:.55rem; cursor:pointer}
.ce-done:hover{filter:brightness(1.08)}
#themebtn{position:absolute; top:0; right:0; width:34px; height:34px; border-radius:50%; border:1px solid var(--line); background:transparent; cursor:pointer; font-size:15px; line-height:1; transition:.15s}
#themebtn:hover{border-color:var(--accent)}
#undo{right:42px}
/* Cada caja del 50/30/20 vive en un contenedor de su color — se distingue de un vistazo qué número es de qué */
.sec-tint{border-radius:var(--rad); border:1px solid; padding:1rem .9rem 1.05rem; margin-top:1.2rem}
#sec-aho.sec-tint{background:rgba(52,199,89,.07); border-color:rgba(52,199,89,.32)}
#sec-nec.sec-tint{background:rgba(0,113,227,.06); border-color:rgba(0,113,227,.28)}
#sec-luj.sec-tint{background:rgba(224,146,47,.08); border-color:rgba(224,146,47,.32)}
/* Macro (arriba) y tríada de cada caja: MISMAS 5 columnas, alineadas vertical y por color:
   Presupuestado · Utilizado · Disponible · Repartido · ✓ Pagado. El macro no repite el reparto por
   caja — en su columna Repartido vive el chip ↻ 50/30/20 (el control); el resultado se ve en cada caja.
   Valores SIN "S/" (pn(), no pe()) — el "S/" ya está grande arriba en el hero. */
.macro,.triad{grid-template-columns:repeat(5,1fr)}
.macro .mc-l{font-size:9.5px}
.macro .mc-v{font-size:14px}
/* Burbuja de reparto: llena su columna, 3 líneas ("Repartir / disponible / ↻ 50/30/20").
   Apagada = gris (claro que es un botón, sin gritar). Encendida = toda la burbuja verde. */
.mc-rollchip{display:block; width:100%; font:inherit; font-size:7.5px; font-weight:600; line-height:1.3; text-align:center;
  color:var(--tx2); background:var(--line2); border:1px solid var(--line); border-radius:9px; padding:.28rem .1rem; cursor:pointer; transition:.15s}
.mc-rollchip .mrc-r{font-size:8.5px; font-weight:700; white-space:nowrap}
.mc-rollchip.on{background:var(--ok); border-color:var(--ok); color:#fff}
.mc-roll{justify-content:center}
/* Barra de liquidez (bajo el macro): azul = ya pagado, morado = falta soltar. En plata, no en %. */
.paybar{height:9px; border-radius:6px; overflow:hidden; display:flex; background:var(--line2); margin-top:.65rem}
.pb-paid{height:100%; background:var(--accent); transition:width .35s cubic-bezier(.4,0,.2,1)}
.pb-rest{height:100%; background:#9b6cf7; transition:width .35s cubic-bezier(.4,0,.2,1)}
.paybar-l{display:flex; justify-content:space-between; gap:.5rem; margin-top:.3rem; font-size:11px; font-weight:700; font-variant-numeric:tabular-nums}
.pbl-paid{color:var(--accent)}
.pbl-rest{color:#9b6cf7; text-align:right}
.tr-tap{cursor:pointer}
/* Checks más visibles: borde marcado. El check "ya pagué" es SIEMPRE azul (accent), en
   cualquier caja — un solo color para "esto es real/ejecutado", distinto del verde/ámbar
   del presupuesto (así se distingue de un vistazo qué está pagado vs. qué es solo el plan).
   Fondo tintado SIEMPRE (no solo contorno) — el check debe ser el elemento MÁS visible de la
   fila, no un cuadrito discreto. */
.pcheck{border-color:var(--tx3)}
.pchk-paid:not(.on){border-color:var(--accent); background:var(--ok-bg)}
.pchk-paid.on{background:var(--accent); border-color:var(--accent)}
/* Una vez pagado, el chip Mín/Mes/Total/Otro ya cumplió su función (elegir CUÁNTO) — se apaga
   para que el check (el YA PAGADO) sea lo único que salte a la vista en esa fila. Antes ambos
   competían en el mismo azul brillante; invertido a pedido de Doble D. */
.row.sub.is-paid + .dmodes{opacity:.45}
.row.sub.is-paid + .dmodes .dmode.on{background:var(--line2); color:var(--tx2); border-color:var(--line)}
/* En celular las 4 etiquetas caben sin recortarse */
@media(max-width:420px){.macro .mc-l,.triad .tr i{font-size:7.8px; letter-spacing:-.01em}}
</style>
</head>
<body>
<div id="welcome" class="welcome" hidden>
  <div class="wel-card">
    <div class="wel-logo">Stash</div>
    <div id="wel-step1">
      <div class="wel-h">¿Cuánto vas a presupuestar este ciclo?</div>
      <div class="wel-sub">Tu sueldo, o el monto que quieras repartir.</div>
      <div class="wel-fondo">S/ <input id="wel-monto" type="number" min="0" step="1" placeholder="3700"></div>
      <button class="wel-opt" data-welnext="1"><span class="wo-t">Continuar →</span></button>
    </div>
    <div id="wel-step2" hidden>
      <div class="wel-h">¿Qué periodo cubre?</div>
      <div class="wel-modes">
        <button class="wel-mode on" data-welmode="m">Un mes</button>
        <button class="wel-mode" data-welmode="q">Una quincena</button>
        <button class="wel-mode" data-welmode="c">Personalizado</button>
      </div>
      <div id="wel-period"></div>
      <button class="wel-opt" data-finishonb="1"><span class="wo-t">Empezar →</span></button>
    </div>
    <div class="wel-foot">Stash reparte tu dinero con la regla <b>50/30/20</b> — el método de Elizabeth Warren (Harvard) para ahorrar primero y gastar tranquilo.</div>
  </div>
</div>
<div class="head">
  <span class="today" id="today"></span>
  <h1>Stash</h1>
  <span class="month-wrap" style="display:none">Mes: <input id="month" placeholder="Julio 2026"></span>
  <div class="q-tabs" id="cyclebar"></div>
  <button id="undo" hidden>&#8624; Deshacer</button>
  <button id="themebtn" title="Cambiar entre modo claro y oscuro">🌙</button>
</div>
<div id="app"></div>
<div id="debts" class="debts"></div>
<div id="sec-fondo" class="sec" style="display:none"></div>
<div id="sec-invertir" class="sec" style="display:none"></div>
<div id="cierre-ovl" class="cierre-ovl" hidden><div class="cierre-card" id="cierre-card"></div></div>
<!-- 3 tabs = el balance general: Inicio (flujo del ciclo) · Deudas (pasivos) · Reserva (activos).
     Invertir vive DENTRO de Reserva (piso 3 de la escalera); Resumen se fundió en Deudas. -->
<nav class="tabbar">
  <button class="tabbtn active" data-view="inicio"><span class="ti">🏠</span><span>Inicio</span></button>
  <button class="tabbtn" data-view="deudas"><span class="ti">💳</span><span>Deudas</span></button>
  <button class="tabbtn" data-view="fondo"><span class="ti">🔒</span><span>Reserva</span></button>
</nav>
<script>
// ===== Tema claro/oscuro: manual con el botón ☀️/🌙; sin elección guardada, sigue al sistema =====
const THEME_KEY='midas_theme';
let theme=localStorage.getItem(THEME_KEY)||'';
function applyTheme(){
  document.documentElement.dataset.theme=theme;

// sin esperar a que el usuario cree un ciclo nuevo. Solo cosmético: no toca payday ni el plan de deudas.
const CYCLEDATE_V=2;
function migrateCycleDates(){
  // Rellena start/end de ciclos legacy ENCADENANDO desde el último ciclo que ya tiene fecha
  // (arranca el día siguiente a su fin, no reinicia en el mes actual — ese era el bug julio/agosto).
  // v<2: además re-encadena los ciclos ya auto-datados (antes de v2 no existía editor manual,
  // así que TODAS las fechas eran automáticas → seguro recalcularlas para corregir el bug ya guardado).
  const stored=parseInt(localStorage.getItem('midas_cycledates_v')||'0',10);
  const reChain=stored<CYCLEDATE_V;
  let changed=false;
  const t=new Date(), y0=t.getFullYear(), m0=t.getMonth()+1;
  let cursorEnd=null; // fin ISO del último ciclo procesado con fecha → ancla del siguiente
  cycles.forEach(c=>{
    if(c.type==='c'){ if(c.end)cursorEnd=c.end; return; } // periodo libre: no le inventamos rango
    if(c.start && !reChain){ if(c.end)cursorEnd=c.end; return; } // ya tiene fecha y no toca re-encadenar
    let sy,sm,sd;
    if(cursorEnd){const dt=new Date(cursorEnd+'T00:00:00');dt.setDate(dt.getDate()+1);sy=dt.getFullYear();sm=dt.getMonth()+1;sd=dt.getDate();}
    else {sy=y0;sm=m0;sd=1;}
    if(c.type==='m'){c.start=sy+'-'+pad2(sm)+'-01';c.end=sy+'-'+pad2(sm)+'-'+pad2(lastDay(sy,sm));}
    else{ if(sd<=15){c.start=sy+'-'+pad2(sm)+'-01';c.end=sy+'-'+pad2(sm)+'-15';} else {c.start=sy+'-'+pad2(sm)+'-16';c.end=sy+'-'+pad2(sm)+'-'+pad2(lastDay(sy,sm));} }
    cursorEnd=c.end; changed=true;
  });
  if(reChain)localStorage.setItem('midas_cycledates_v',String(CYCLEDATE_V));
  if(changed)saveCycles();
}

const MESES=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
function cap(s){return s?s.charAt(0).toUpperCase()+s.slice(1):s;}

// arrastres/rollover en el siguiente ciclo antes de saltar). addCycle = crear + saltar (la barra).
function createCycle(type){
  // start/end del nuevo ciclo: arranca el día siguiente al último ciclo con fecha fin.
  const ends=cycles.map(c=>c.end).filter(Boolean).sort();
  let start='', end='';
  if(ends.length){
    const dt=new Date(ends[ends.length-1]+'T00:00:00'); dt.setDate(dt.getDate()+1);
    start=isoOf(dt);
    const y=dt.getFullYear(), m=dt.getMonth()+1, dd=dt.getDate();
    if(type==='m'){const e=new Date(dt);e.setMonth(e.getMonth()+1);e.setDate(e.getDate()-1);end=isoOf(e);}
    else if(type==='q'){
      if(dd===1)end=y+'-'+pad2(m)+'-15';
      else if(dd===16)end=y+'-'+pad2(m)+'-'+pad2(lastDay(y,m));
      else{const e=new Date(dt);e.setDate(e.getDate()+14);end=isoOf(e);}
    }
    else{const e=new Date(dt);e.setDate(e.getDate()+14);end=isoOf(e);} // periodo libre: 15 días por defecto
  }
  const withDates=cycles.map(c=>dateVal(cyclePayday(c.id))).filter(s=>!isNaN(s)&&s<9e15);
  let base='';
  if(withDates.length){const dt=new Date(Math.max.apply(null,withDates));
    if(type==='m')dt.setMonth(dt.getMonth()+1); else dt.setDate(dt.getDate()+15);
    base=isoOf(dt);}
  const id='c'+Date.now(), n=cycles.filter(c=>c.type===type).length+1;
  cycles.push({id,type,start,end,label:(type==='m'?'Mes ':type==='q'?'Quincena ':'Periodo ')+n});saveCycles();
  const nd=def();nd.payday=base;localStorage.setItem(keyFor(id),JSON.stringify(nd));
  return id;
}

  if(hasSubs(row)){let t=0;row.sub.forEach((s,j)=>{if(!(d.itemPaid&&d.itemPaid['aho-'+pp[1]+'-'+j]))t+=parseFloat(s.a)||0;});return t;}
  return parseFloat(row.a)||0;}

  if(pp.length===3){const s=row.sub&&row.sub[+pp[2]];return (row.l?row.l+' / ':'')+((s&&s.l)||'ahorro');}
  return row.l||'Ahorro';}

  const debtPend=Object.keys(d.debtPay||{}).filter(n=>debts.some(x=>x.n===n&&!x.auto)&&!(d.paid&&d.paid[n]))

function commitCierre(){
  const c=cierre; if(!c)return;
  const ejecBase=ejecutadoSum();
  const ahoYes=c.ahoPend.filter(x=>x.yes);
  const ejecFinal=ejecBase+ahoYes.reduce((t,x)=>t+x.amt,0);
  const res=c.ing-ejecFinal;
  const D=res<-0.5?-res:0, usa=Math.min(fondo,D), resto=D-usa;
  if((res>0.5&&!c.destino)||(resto>0.5&&!c.defTrato))return; // faltan decisiones
  snapshot();
  const fondoAntes=fondo;
  const miLabel=cycleLabel(cycleOf(activeQ));
  // 1) ahorro confirmado al cerrar → Reserva (queda revertible al destildar, igual que en vivo)
  ahoYes.forEach(x=>{ if(!d.itemPaid)d.itemPaid={}; d.itemPaid[x.k]=true;
    if(!d.ahoMoved)d.ahoMoved={}; d.ahoMoved[x.k]=x.amt;
    fondo+=x.amt; addResLog(x.amt,x.label+' (al cerrar)'); });
  // 2) resultado del ciclo
  let destino='limpio';
  if(res>0.5){ if(c.destino==='fondo'){fondo+=res;addResLog(res,'Sobrante de '+miLabel);destino='fondo';} else destino='ciclo'; }
  else if(D>0.5){ if(usa>0.5){fondo-=usa;addResLog(-usa,'Cubrió el déficit de '+miLabel);}
    destino=resto>0.5?(c.defTrato==='desc'?'descuento':'cero'):'reserva'; }
  saveFondo();
  // 3) asiento de cierre (closing entry) — la memoria del ciclo, para el historial y comparaciones
  d.closeLog={fecha:isoToday(),ingreso:Math.round(c.ing),ejecutado:Math.round(ejecFinal),resultado:Math.round(res),
    fondoAntes:Math.round(fondoAntes),fondoDespues:Math.round(fondo),destino,
    arrastradas:c.debtPend.filter(x=>x.carry).map(x=>x.n)};
  d.closed=true; save();
  // 4) siguiente ciclo (el que sigue en la barra, o nace) + arrastres + rollover/descuento
  const idx=cycles.findIndex(x=>x.id===activeQ);
  const nid=(idx>=0&&idx<cycles.length-1)?cycles[idx+1].id:createCycle(cycleOf(activeQ).type);
  const nx=load(nid);
  c.debtPend.filter(x=>x.carry).forEach(x=>{const n=x.n;
    if(!nx.debtPay)nx.debtPay={}; nx.debtPay[n]=(d.debtPay&&d.debtPay[n])||'min';
    if(d.debtPay&&d.debtPay[n]==='otro'){if(!nx.otroMonto)nx.otroMonto={};nx.otroMonto[n]=d.otroMonto&&d.otroMonto[n];}
    const s=d.debtSnap&&d.debtSnap[n]; if(s){if(!nx.debtSnap)nx.debtSnap={};nx.debtSnap[n]=JSON.parse(JSON.stringify(s));}
    if(!nx.carried)nx.carried={}; nx.carried[n]=miLabel; });
  if(res>0.5&&c.destino==='ciclo')nx.inc.push({l:'Sobrante del ciclo anterior',a:Math.round(res)});
  if(resto>0.5&&c.defTrato==='desc')nx.inc.push({l:'Déficit del ciclo anterior',a:-Math.round(resto)});
  localStorage.setItem(keyFor(nid),JSON.stringify(nx));
  cierre=null; const ov=document.getElementById('cierre-ovl'); if(ov)ov.hidden=true;
  switchCycle(nid);
}

    ? '<div class="tjcuotas">Cargo <b>'+pe(monto)+'</b> en <input type="number" min="1" step="1" data-tjcuotas="1" data-grp="'+g+'" data-idx="'+i+'"'+sj+' value="'+cuotas+'"> cuotas → <b id="tjcuota">'+pe(monto/cuotas)+'</b>/mes</div>'
    : '';
  return '<div class="tjpicker"><div class="tjpicker-h">¿En qué tarjeta cargas <b>'+esc(r.l||'esto')+'</b>? La <b>recomendada</b> es la de más línea libre que aguanta el monto ('+pe(monto)+').</div>'+opts+
    (r.tj?'<button class="tjpick none" data-tjpick="" data-grp="'+g+'" data-idx="'+i+'"'+sj+'>↺ Quitar de tarjeta (volver a efectivo)</button>':'')+
    cuotaBox+'</div>';
}
function rowH(g,i,r){
  const sub=hasSubs(r);
  const amt=sub?sum(r.sub):r.a;
  const canTj=(g==='nec'||g==='luj');
  const paid=!!(d.itemPaid&&d.itemPaid[g+'-'+i]);
  // Plegar subcategorías: TODA categoría (nec/luj/aho) tiene chevron. Por defecto DESPLEGADA si tiene
  // subcategorías (muestra el desglose), PLEGADA si no las tiene (solo ves el monto — no ensucia con el
  // botón "+ Subcategoría" hasta que entras). Estado en collapsed['g-i'] (igual que itemPaid se llavea
  // por g-i — cosmético, se auto-cura al reindexar).
  const foldable=g!=='inc';
  const key=g+'-'+i;
  // Por defecto PLEGADA (solo el monto). EXCEPCIÓN: si tiene subcategorías PARCIALMENTE pagadas
  // (algunas ✓, otras no) se abre sola para que veas cuál falta. Si todas o ninguna → plegada.
  const someSubPaid=sub && d.itemPaid && r.sub.some((s,j)=>d.itemPaid[key+'-'+j]);
  const allSubPaid=sub && r.sub.every((s,j)=>d.itemPaid&&d.itemPaid[key+'-'+j]);
  // Parcial = abre sola. PERO si el check de la categoría (padre) está marcado, NO se abre (aunque
  // queden subs sin marcar): la categoría se dio por pagada entera → se oculta.
  const partial=!!(someSubPaid && !allSubPaid && !paid);
  const folded=foldable && (key in collapsed ? !!collapsed[key] : !partial);
  let h='<div class="row'+(r.tj?' tjon':'')+(paid?' is-paid':'')+'">'+
    (foldable?'<button class="subtoggle" data-subfold="'+key+'" title="Plegar/desplegar subcategorías">'+(folded?'▸':'▾')+'</button>':'')+
    '<input class="l" data-grp="'+g+'" data-idx="'+i+'" data-f="l" value="'+esc(r.l)+'" placeholder="Categoría">'+
    '<input class="a" type="number" min="0" step="1" data-grp="'+g+'" data-idx="'+i+'" data-f="a" value="'+amt+'" placeholder="0"'+(sub?' readonly':'')+'>'+
    (canTj?'<button class="tjt'+(r.tj?' on':'')+'" data-tjt="1" data-grp="'+g+'" data-idx="'+i+'" title="'+(r.tj?'En tarjeta: '+esc(r.tjCard||''):'Pagar con tarjeta')+'">'+TJ_SVG+'</button>':'')+
    '<button class="rm" data-grp="'+g+'" data-idx="'+i+'" aria-label="Eliminar">&times;</button>'+
    (g!=='inc'?'<button class="pcheck pchk-paid'+(paid?' on':'')+'" data-itempaid="'+g+'-'+i+'" title="'+(g==='aho'?'Ya lo aparté — viaja a tu Reserva':'Ya pagué esto')+'">'+(paid?'✓':'')+'</button>':'')+'</div>';
  if(canTj && tjOpen===(g+'-'+i)) h+=tjPickerH(g,i,null,r);
  if(g!=='inc'){
    h+='<div class="subwrap"'+(folded?' style="display:none"':'')+'>';
    if(sub) h+=r.sub.map((s,j)=>subRowH(g,i,j,s)).join('');
    h+='<button class="add sub-add" data-subadd="'+g+'" data-idx="'+i+'"><span class="p">+</span> Subcategoría</button></div>';
  }
  return h;
}

// Informe final: a dónde va la plata + ¿reduces o creces deuda?
function informeH(){
  const ti=sum(d.inc), p=computePlan();
  const necCash=sumCash(d.nec), lujCash=sumCash(d.luj), ahoSav=sum(d.aho);
  const debtPay=p.paySum, tarj=p.tarj, total=necCash+lujCash+ahoSav+debtPay;
  const pct=v=>ti>0?Math.round(v/ti*100):0;
  const bar=(label,v,cls)=>'<div class="inf-row"><span class="inf-l">'+label+'</span><span class="inf-track"><span class="inf-fill '+cls+'" style="width:'+Math.min(pct(v),100)+'%"></span></span><span class="inf-v">'+pe(v)+' <i>'+pct(v)+'%</i></span></div>';
  let h='<div class="inf-h">A dónde va tu plata esta quincena</div>';
  h+=bar('Necesidades (efectivo)',necCash,'c-nec');
  h+=bar('Gustos (efectivo)',lujCash,'c-luj');
  h+=bar('Ahorro (Reserva + Inversión)',ahoSav,'c-aho');
  h+=bar('Deuda (pago de mínimos)',debtPay,'c-deu');
  h+='<div class="inf-tot">Destinas <b>'+pe(total)+'</b> de <b>'+pe(ti)+'</b> de ingreso'+(ti-total>0.5?' · te queda <b>'+pe(ti-total)+'</b> libre':'')+'</div>';
  h+='<div class="inf-h" style="margin-top:1.3rem">Deuda: ¿la reduces o la creces?</div>';
  h+='<div class="inf-deu"><div>Cargas <b>nuevas</b> a tarjeta este mes <span>'+pe(tarj)+'</span></div><div>Pagas a tus deudas <span>'+pe(debtPay)+'</span></div></div>';
  if(debtPay>=tarj+0.5) h+='<div class="inf-verdict ok">✅ Pagas <b>'+pe(debtPay-tarj)+'</b> más de lo que generas — vas <b>reduciendo</b> deuda.</div>';
  else if(tarj>debtPay+0.5) h+='<div class="inf-verdict bad">⚠️ Generas <b>'+pe(tarj-debtPay)+'</b> más deuda de la que pagas — está <b>creciendo</b>. Tarjetea menos o abona más.</div>';
  else h+='<div class="inf-verdict neutral">➖ Pagas casi lo mismo que cargas — tu deuda se mantiene.</div>';
  return h;
}
function refreshInforme(){const el=document.getElementById('informe-body');if(el)el.innerHTML=informeH();}
function recompute(){
  syncParents();
  if(typeof ensureDebtSnaps==='function')ensureDebtSnaps(); // migra/rellena las fotos de deuda antes de mostrar
  if(typeof reconcileTjDebts==='function')reconcileTjDebts();
  const ti=sum(d.inc);
  const ge=(id)=>document.getElementById(id);
  const tot=ge('tot-inc');if(tot)tot.textContent=pe(ti);
  const binc=ge('b-inc');if(binc)binc.textContent=pe(ti);
  const hn=ge('hi-num');if(hn)hn.textContent=pe(ti);
  const hc=ge('hi-cycle');if(hc){const cyc=cycleOf(activeQ);
    const dates=cyc.start?' ('+fmtFecha(cyc.start)+' – '+fmtFecha(cyc.end)+')':'';
    hc.textContent=cycleLabel(cyc)+dates;}
  let gas=0;const acts={},tgts={};
  buckets.forEach(b=>{const g=b[0];let act=(g==='nec'||g==='luj')?sumCash(d[g]):sum(d[g]);
    if(g==='aho'){act+=debtPaySum();}
    const tgt=ti*b[2];gas+=act;acts[g]=act;tgts[g]=tgt;
    document.getElementById('tg-'+g).textContent=pn(tgt);
    document.getElementById('sm-'+g).textContent=pn(act);
    const bar=document.getElementById('bar-'+g);
    const pctFill=tgt>0?Math.min(act/tgt*100,100):0;
    bar.style.width=pctFill+'%';
    bar.style.background=(act>tgt)?'var(--bad)':'var(--ok)';
  });
  // Cascada WATERFALL por prioridad (Ahorro > Necesidades > Gustos). El exceso de Ahorro cae ÍNTEGRO
  // sobre Gustos (lo menos importante) — si se pasa de su presupuesto, Gustos muestra su NEGATIVO, y ese
  // negativo se arrastra a Necesidades (última parada). El exceso de Necesidades también lo cubre Gustos
  // si tiene saldo. Ahorro nunca absorbe (protegido). Necesidades es el ÚNICO que queda con el déficit
  // TOTAL cuando ya no hay de dónde sacar — y ese número coincide con el Disponible del macro de arriba.
  const rawAho=(tgts.aho||0)-(acts.aho||0);
  const rawNec=(tgts.nec||0)-(acts.nec||0);
  const rawLuj=(tgts.luj||0)-(acts.luj||0);
  const excAho=Math.max(-rawAho,0), excNec=Math.max(-rawNec,0);
  lastOver=excAho; // para decidir el orden del wizard
  const slackLuj0=Math.max(rawLuj,0);
  let gLuj=rawLuj-excAho;                       // Gustos recibe el exceso de Ahorro (puede quedar negativo)
  const ahoOnLuj=Math.min(excAho,slackLuj0);    // parte del exceso de ahorro que el saldo de Gustos cubrió
  let nNec=rawNec, necOnLuj=0;
  if(gLuj>0.5 && excNec>0.5){ necOnLuj=Math.min(gLuj,excNec); gLuj-=necOnLuj; nNec+=necOnLuj; } // Gustos cubre el exceso de Necesidades
  const gNeg=Math.max(-gLuj,0);                 // lo que Gustos quedó en rojo → se arrastra a Necesidades
  nNec-=gNeg;
  const showLn=(id,txt,cls)=>{const e=document.getElementById(id);if(!e)return;e.innerHTML=txt||'';e.className=cls;e.style.display=txt?'':'none';};
  const setDisp=(g,v)=>{const e=document.getElementById('disp-'+g);if(e){e.textContent=pn(v);e.style.color=v<-0.5?'var(--bad)':(v>0.5?'var(--ok)':'var(--tx2)');}};
  setDisp('aho', rawAho);   // Ahorro: su propio número (negativo si ahorraste de más)
  setDisp('luj', gLuj);     // Gustos: reducido por lo que cubrió; negativo si el exceso lo pasó
  setDisp('nec', nNec);     // Necesidades: terminal — su negativo = déficit total (= Disponible macro)
  {const sm=document.getElementById('sm-luj'); if(sm)sm.textContent=pn((tgts.luj||0)-gLuj);}
  {const sm=document.getElementById('sm-nec'); if(sm)sm.textContent=pn((tgts.nec||0)-nNec);}
  showLn('red-aho', excAho>0.5?'− '+pe(excAho)+' se arrastra a '+(gNeg>0.5?'gustos y necesidades':'gustos'):'', 'ln-red');
  showLn('mg-aho', '', 'ln-mg');
  const lujParts=[];
  if(ahoOnLuj>0.5) lujParts.push('− '+pe(ahoOnLuj)+' cubre el exceso de ahorro');
  if(necOnLuj>0.5) lujParts.push('− '+pe(necOnLuj)+' cubre el exceso de necesidades');
  if(gNeg>0.5) lujParts.push('− '+pe(gNeg)+' se arrastra a necesidades');
  showLn('red-luj', lujParts.join('<br>'), 'ln-red');
  showLn('mg-luj', '', 'ln-mg');
  const necParts=[];
  if(necOnLuj>0.5) necParts.push('− '+pe(necOnLuj)+' se arrastra a gustos');
  if(gNeg>0.5) necParts.push('− '+pe(gNeg)+' se arrastra desde gustos');
  if(nNec<-0.5) necParts.push('<b>Déficit total: al presupuesto le faltan '+pe(-nNec)+'</b>');
  showLn('red-nec', necParts.join('<br>'), 'ln-red');
  showLn('mg-nec', '', 'ln-mg');
  // Macro (arriba): Presupuestado (tu presupuesto total) / Utilizado (lo asignado, naranja) / Disponible (lo que queda).
  (function(){
    const p=document.getElementById('mc-pres'); if(p)p.textContent=pn(ti);
    const u=document.getElementById('mc-util'); if(u)u.textContent=pn(gas);
    const disp=ti-gas, de=document.getElementById('mc-disp');
    if(de){de.textContent=pn(disp); de.style.color=disp<-0.5?'var(--bad)':'var(--ok)';}
  })();
  // 4ª columna "✓ Pagado": % de lo comprometido que ya marcaste como real — por caja y global.
  (function(){
    const realG=ejecutadoPorGrupo();
    const paint=(el,real,base)=>{if(!el)return;
      const pct=base>0.5?Math.round(Math.min(real/base,1)*100):null;
      el.textContent=pct==null?'—':pct+'%';
      el.style.color=(pct==null||pct<=0)?'var(--tx3)':'var(--accent)';};
    ['aho','nec','luj'].forEach(g=>paint(document.getElementById('done-'+g),realG[g]||0,acts[g]||0));
    const realT=realG.aho+realG.nec+realG.luj;
    paint(document.getElementById('mc-done'),realT,gas);
    // Barra de liquidez bajo el macro: pagaste (azul) vs falta soltar (morado), en plata.
    const bar=document.getElementById('paybar'), lbl=document.getElementById('paybar-l');
    if(bar&&lbl){
      if(gas>0.5){
        const paidC=Math.min(realT,gas), rest=Math.max(gas-realT,0);
        bar.style.display=''; lbl.style.display='';
        document.getElementById('pb-paid').style.width=(paidC/gas*100)+'%';
        document.getElementById('pb-rest').style.width=(rest/gas*100)+'%';
        document.getElementById('pbl-paid').textContent='✓ Pagaste '+pe(paidC);
        document.getElementById('pbl-rest').textContent=rest>0.5?'Falta soltar '+pe(rest):'¡Todo pagado! 🎉';
      } else { bar.style.display='none'; lbl.style.display='none'; }
    }
  })();
  document.getElementById('b-gas').textContent=pe(gas);
  const saldo=ti-gas,sl=document.getElementById('b-sl');
  lastSaldo=saldo; // para el snapshot del rollover
  sl.textContent=pe(saldo);
  sl.style.color=saldo>=0?'var(--ok)':'var(--bad)';
  document.getElementById('b-sl-l').textContent=saldo>=0?'Saldo libre':'Déficit';
  const fn=document.getElementById('fondo-note');

/* ===== Módulo Deudas — motor de plan de pago priorizado ===== */
const DEBT_KEY='midas_debts';
const debtDef=()=>[];
function loadDebts(){try{const x=JSON.parse(localStorage.getItem(DEBT_KEY));if(Array.isArray(x))return x.filter(r=>!r.auto);}catch(e){}return debtDef();}
let debts=loadDebts();
function saveDebts(){localStorage.setItem(DEBT_KEY,JSON.stringify(debts));}
// Suma meses a una fecha ISO (para escalonar las cuotas de tarjeteo por ciclo).
function addMonths(iso,k){if(!iso)return '';const dt=new Date(iso+'T00:00:00');if(isNaN(dt))return '';dt.setMonth(dt.getMonth()+k);
  return dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0');}
// Regenera las filas de cuota (auto) desde el estado de tarjeteo del presupuesto. Idempotente.
function reconcileTjDebts(){
  const manual=debts.filter(x=>!x.auto), auto=[];
  cycles.forEach(c=>{const q=c.id;const x=(q===activeQ)?d:load(q);
    const base=x.payday||'';
    // Genera N cuotas (la 1ra el PRÓXIMO mes, misma fecha: k+1) para un gasto tarjeteado.
    const emit=(label,monto,card,cuotasN)=>{
      if(!card||monto<=0)return;
      const N=Math.max(parseInt(cuotasN)||1,1), cuota=Math.round(monto/N*100)/100;

function dueLabel(s){if(!s)return 'sin fecha';const dt=new Date(s+'T00:00:00');return isNaN(dt)?s:dt.getDate()+' '+MES[dt.getMonth()];}
