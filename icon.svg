<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Stash 20/50/30 — las 3 velitas con el color y el tamaño de su caja:
       verde ahorro (20) · azul necesidades (50) · ámbar gustos (30) -->
  <rect width="512" height="512" rx="112" fill="#fbfbfd"/>
  <g fill="none" stroke-width="40" stroke-linecap="round">
    <path d="M140 352 V264" stroke="#1d8a5f"/>
    <path d="M256 352 V132" stroke="#0071e3"/>
    <path d="M372 352 V220" stroke="#e6a817"/>
  </g>
  <circle cx="140" cy="206" r="22" fill="#1d8a5f"/>
  <circle cx="256" cy="74"  r="22" fill="#0071e3"/>
  <circle cx="372" cy="162" r="22" fill="#e6a817"/>
  <g font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="54" font-weight="700" text-anchor="middle">
    <text x="140" y="446" fill="#1d8a5f">20</text>
    <text x="256" y="446" fill="#0071e3">50</text>
    <text x="372" y="446" fill="#e6a817">30</text>
  </g>
</svg>
